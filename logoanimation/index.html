<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decision Tree Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Background measured from the reference logo PNG */
    --bg: #072420;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Futura', 'Futura PT', 'League Spartan', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .stage {
    width: min(95vw, 900px);
    aspect-ratio: 800 / 450;
  }
  svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ═══════════════════════════════════════════════════════════
           Geometry derived from reference logo PNG (4409×2484), scaled 0.181:
             stroke = 5      (ref 27 × 0.181)
             r = 14          (conceptual radius; ref visible diameter 180 ÷ scaled)
             visible diameter = 33 (= 2r + stroke)
             visible trunk/drop = 33 (matching reference where trunk=diameter)
             crossbar_full = 165 (ref 911 × 0.181)
             crossbar_half = 82.5
           Vertical layout:
             icon_outer_top = 78 (ref 431 × 0.181)
             root_cy = 94.5 (= 78 + r + half_stroke)
             crossbar_y = 146 (centerline)
             child_cy = 198.5
             icon_outer_bottom = 215
           Children at x = 400 ± 82.5 = 317.5, 400, 482.5
           ═══════════════════════════════════════════════════════════ -->

      <!-- Cream lines (base layer). All stroke 5, square linecap so elbow corners seal cleanly. -->
      <line id="trunk"  x1="400" y1="111"   x2="400" y2="146.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#DDCAAB" stroke-width="5" stroke-linecap="square"/>
      <line id="crossL" x1="400" y1="146.5" x2="317.5" y2="146.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#DDCAAB" stroke-width="5" stroke-linecap="square"/>
      <line id="crossR" x1="400" y1="146.5" x2="482.5" y2="146.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#DDCAAB" stroke-width="5" stroke-linecap="square"/>
      <line id="dropL"  x1="317.5" y1="146.5" x2="317.5" y2="182"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#DDCAAB" stroke-width="5" stroke-linecap="square"/>
      <line id="dropM"  x1="400" y1="146.5" x2="400" y2="182"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#DDCAAB" stroke-width="5" stroke-linecap="square"/>
      <line id="dropR"  x1="482.5" y1="146.5" x2="482.5" y2="182"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#DDCAAB" stroke-width="5" stroke-linecap="square"/>

      <!-- Node strokes -->
      <circle id="root"  cx="400"   cy="94.5"  r="0" fill="none" stroke="#DDCAAB" stroke-width="5"/>
      <circle id="nodeL" cx="317.5" cy="198.5" r="0" fill="none" stroke="#DDCAAB" stroke-width="5"/>
      <circle id="nodeM" cx="400"   cy="198.5" r="0" fill="none" stroke="#DDCAAB" stroke-width="5"/>
      <circle id="nodeR" cx="482.5" cy="198.5" r="0" fill="none" stroke="#DDCAAB" stroke-width="5"/>

      <!-- Right child inner fill: tiny green disc that grows from center -->
      <circle id="rightFill" cx="482.5" cy="198.5" r="0" fill="#67C070"/>

      <!-- Green overlay lines (drawn progressively as the wave passes) -->
      <line id="trunkGreen"  x1="400" y1="111"   x2="400" y2="146.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#67C070" stroke-width="5" stroke-linecap="square"/>
      <line id="crossRGreen" x1="400" y1="146.5" x2="482.5" y2="146.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#67C070" stroke-width="5" stroke-linecap="square"/>
      <line id="dropRGreen"  x1="482.5" y1="146.5" x2="482.5" y2="182"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#67C070" stroke-width="5" stroke-linecap="square"/>

      <!-- Signal dot (subtle wave of light) -->
      <circle id="signal" cx="400" cy="94.5" r="0" fill="#a8f0bd" opacity="0" filter="url(#softGlow)"/>

      <!-- Brand text — fades in at the end -->
      <text id="title" x="400" y="309" text-anchor="middle"
            font-family="Futura, 'Futura PT', 'League Spartan', sans-serif"
            font-size="74" font-weight="700" letter-spacing="2"
            fill="#DDCAAB" opacity="0">DECISION TREE</text>
      <text id="subtitle" x="400" y="360" text-anchor="middle"
            font-family="Futura, 'Futura PT', 'League Spartan', sans-serif"
            font-size="46" font-weight="700" letter-spacing="13"
            fill="#67C070" opacity="0">RESEARCH</text>
    </svg>
  </div>
</div>

<script>
(() => {
  // One-shot logo intro: plays from frame 0 to FRAMES, then stops at the final state.
  const FRAMES = 180;
  const DURATION = 6000;

  const NEUTRAL = [221, 202, 171];  // #DDCAAB
  const GREEN = [103, 192, 112];    // #67C070
  const NODE_R = 14;

  // Allow ?frame=N to jump straight to a specific frame (used by the test renderer)
  const urlParams = new URLSearchParams(window.location.search);
  const STATIC_FRAME = urlParams.has('frame') ? parseFloat(urlParams.get('frame')) : null;

  // Geometry constants
  const ROOT_CX = 400, ROOT_CY = 94.5;
  const CROSSBAR_Y = 146.5;
  const CHILD_CY = 198.5;
  const RIGHT_X = 482.5;

  // ─── Helpers ───────────────────────────────────────────────────
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const lerp = (a, b, t) => a + (b - a) * t;
  const easeOutQuart = (t) => 1 - Math.pow(1 - t, 4);
  const snap = (frame, a, b) => {
    if (frame <= a) return 0;
    if (frame >= b) return 1;
    return easeOutQuart((frame - a) / (b - a));
  };
  const linstep = (frame, a, b) => clamp((frame - a) / (b - a), 0, 1);
  const lerpColor = (c1, c2, t) => {
    const r = Math.round(lerp(c1[0], c2[0], t));
    const g = Math.round(lerp(c1[1], c2[1], t));
    const b = Math.round(lerp(c1[2], c2[2], t));
    return `rgb(${r},${g},${b})`;
  };

  const $ = id => document.getElementById(id);
  const trunk = $('trunk'),  crossL = $('crossL'), crossR = $('crossR');
  const dropL = $('dropL'),  dropM = $('dropM'),   dropR = $('dropR');
  const root = $('root'),    nodeL = $('nodeL'),   nodeM = $('nodeM'),  nodeR = $('nodeR');
  const trunkGreen = $('trunkGreen'), crossRGreen = $('crossRGreen'), dropRGreen = $('dropRGreen');
  const rightFill = $('rightFill');
  const signal = $('signal');
  const title = $('title'),  subtitle = $('subtitle');

  // Wave path: root center → crossbar joint → cross-R end → right child center
  // Distances: trunk segment + cross-right segment + drop-right-into-child
  const SEG1 = CROSSBAR_Y - ROOT_CY;     // 51.5
  const SEG2 = RIGHT_X - ROOT_CX;        // 82.5
  const SEG3 = CHILD_CY - CROSSBAR_Y;    // 52.5
  const TOTAL_PATH = SEG1 + SEG2 + SEG3; // 186.5

  function pointOnDecisionPath(p) {
    const d = p * TOTAL_PATH;
    if (d <= SEG1) return [ROOT_CX, ROOT_CY + d];
    if (d <= SEG1 + SEG2) return [ROOT_CX + (d - SEG1), CROSSBAR_Y];
    return [RIGHT_X, CROSSBAR_Y + (d - SEG1 - SEG2)];
  }

  function update(frame) {
    // 0–56  BUILD  · 56–88  HOLD  · 88–130  WAVE  · 130–150  DISC  · 150–180  TEXT  · 180+ HOLD

    const rootBuild  = snap(frame, 0,  8);
    const trunkBuild = snap(frame, 8,  20);
    const crossBuild = snap(frame, 22, 32);
    const dropBuild  = snap(frame, 34, 44);
    const childBuild = snap(frame, 46, 56);

    const wave = linstep(frame, 88, 130);
    const wavePathDist = wave * TOTAL_PATH;

    // The trunk and root stay CREAM in the logo. The wave's signal dot travels
    // through the trunk (visually) but does NOT paint it green. Green coloring
    // only applies to the chosen branch (cross-right, drop-right, right child).
    const crossRPaintP = clamp((wavePathDist - SEG1) / SEG2, 0, 1);
    const dropRPaintP  = clamp((wavePathDist - SEG1 - SEG2) / SEG3, 0, 1);
    const rightStrokeT = clamp((wavePathDist - (TOTAL_PATH - 22)) / 22, 0, 1);

    const innerFillT = snap(frame, 130, 150);
    const textOp     = snap(frame, 150, 180);

    root.setAttribute('r',  String(NODE_R * rootBuild));
    nodeL.setAttribute('r', String(NODE_R * childBuild));
    nodeM.setAttribute('r', String(NODE_R * childBuild));
    nodeR.setAttribute('r', String(NODE_R * childBuild));
    rightFill.setAttribute('r', String(NODE_R * innerFillT));

    trunk.setAttribute('stroke-dashoffset',  String((1 - trunkBuild) * 100));
    crossL.setAttribute('stroke-dashoffset', String((1 - crossBuild) * 100));
    crossR.setAttribute('stroke-dashoffset', String((1 - crossBuild) * 100));
    dropL.setAttribute('stroke-dashoffset',  String((1 - dropBuild)  * 100));
    dropM.setAttribute('stroke-dashoffset',  String((1 - dropBuild)  * 100));
    dropR.setAttribute('stroke-dashoffset',  String((1 - dropBuild)  * 100));

    // Trunk green overlay never paints — kept invisible always.
    crossRGreen.setAttribute('stroke-dashoffset', String((1 - crossRPaintP) * 100));
    dropRGreen.setAttribute('stroke-dashoffset',  String((1 - dropRPaintP)  * 100));

    // Root stroke stays cream throughout (matches the logo).
    nodeR.setAttribute('stroke', lerpColor(NEUTRAL, GREEN, rightStrokeT));

    if (wave > 0 && wave < 1) {
      const [sx, sy] = pointOnDecisionPath(wave);
      signal.setAttribute('cx', String(sx));
      signal.setAttribute('cy', String(sy));
      signal.setAttribute('r', '4');
      signal.setAttribute('opacity', String(Math.sin(wave * Math.PI) * 0.85));
    } else {
      signal.setAttribute('opacity', '0');
    }

    title.setAttribute('opacity', String(textOp));
    subtitle.setAttribute('opacity', String(textOp));
  }

  if (STATIC_FRAME !== null) {
    // Test mode: render exactly that frame and stop.
    update(STATIC_FRAME);
  } else {
    let startTime = null;
    function tick(now) {
      if (startTime === null) startTime = now;
      const elapsed = now - startTime;
      const frame = Math.min((elapsed / DURATION) * FRAMES, FRAMES);
      update(frame);
      if (frame < FRAMES) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
})();
</script>
</body>
</html>
