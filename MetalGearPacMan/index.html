                deactivateAllAlarms();
                return;
            }

            // Emit rings for the first 9 seconds (timer counts from 15 down, so > 6)
            const elapsed = 15.0 - gameState.alarmTimer; // approximate; resets extend timer
            gameState.alarmBroadcastTimer += deltaTime;
            if (gameState.alarmBroadcastTimer >= 1.5 && gameState.alarmTimer > (gameState.alarmTimer + elapsed - 9.0 > 0 ? 0 : 999)) {
                // Simpler: broadcast while alarmBroadcastTimer < 9 seconds total
                // We track cumulative broadcast time separately
            }

            // Actually, let's track broadcast time simply:
            // Each alarmed ghost emits rings. We track per-ghost broadcast elapsed.
            ghosts.forEach(ghost => {
                if (!ghost.alarmed || ghost.frightened) return;
                if (ghost.state === 'CAGE' || ghost.state === 'EXITING' || ghost.state === 'EATEN') return;

                // Initialize broadcast tracking
                if (ghost._broadcastElapsed === undefined) ghost._broadcastElapsed = 0;
                ghost._broadcastElapsed += deltaTime;

                // Only broadcast for first 9 seconds of this ghost's alarm
                if (ghost._broadcastElapsed > 9.0) return;

                // Track time since last ring emission
                if (ghost._ringTimer === undefined) ghost._ringTimer = 0;
                ghost._ringTimer += deltaTime;
                if (ghost._ringTimer >= 0.75) {
                    ghost._ringTimer -= 0.75;
                    // Emit a ring from this ghost's position
                    const gd = dirToDelta(ghost.direction);
                    const gp = ghost.pixelProgress || 0;
                    const px = (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2;
                    const py = (ghost.tileY + gd.dy * gp) * TILE_SIZE + TILE_SIZE / 2;
                    gameState.alarmRings.push({
                        x: px,
                        y: py,
                        radius: 0,
                        maxRadius: 6 * TILE_SIZE,
                        opacity: 1.0,
                        sourceGhost: ghost.name
                    });
                }
            });

            // Update existing rings: expand and check for cascade
            const RING_SPEED = 6 * TILE_SIZE / 0.6; // reaches 6 tiles in 0.6 seconds
            for (let i = gameState.alarmRings.length - 1; i >= 0; i--) {
                const ring = gameState.alarmRings[i];
                ring.radius += RING_SPEED * deltaTime;
                ring.opacity = 1.0 - (ring.radius / ring.maxRadius);

                // Check if ring touches any non-alarmed ghost (cascade)
                ghosts.forEach(ghost => {
                    if (ghost.alarmed || ghost.frightened) return;
                    if (ghost.state === 'CAGE' || ghost.state === 'EXITING' || ghost.state === 'EATEN') return;
                    const gd = dirToDelta(ghost.direction);
                    const gp = ghost.pixelProgress || 0;
                    const gx = (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2;
                    const gy = (ghost.tileY + gd.dy * gp) * TILE_SIZE + TILE_SIZE / 2;
                    const dist = Math.hypot(gx - ring.x, gy - ring.y);
                    // Ring touches ghost if within ~half a tile of the ring edge
                    if (Math.abs(dist - ring.radius) < TILE_SIZE * 0.6) {
                        activateGhostAlarm(ghost);
                    }
                });

                // Remove expired rings
                if (ring.radius >= ring.maxRadius) {
                    gameState.alarmRings.splice(i, 1);
                }
            }
        }

        function updateGhost(ghost, deltaTime) {
            // EMP freeze — skip all ghost logic
            if (upgradeEffects.empTimer > 0 && ghost.state !== 'CAGE' && ghost.state !== 'EATEN') return;

            // ═══ SAFETY LAYER 1: Per-frame position sanity check ═══
            // If a ghost is on a non-walkable tile OR in an isolated pocket, rescue it.
            if (ghost.state !== 'CAGE' && ghost.state !== 'EXITING' && ghost.state !== 'EATEN') {
                const gx = Math.round(ghost.tileX);
                const gy = Math.round(ghost.tileY);
                let needsRescue = false;
                if (gx < 0 || gx >= MAZE_WIDTH || gy < 0 || gy >= MAZE_HEIGHT) {
                    needsRescue = true;
                } else if (!isWalkable(gx, gy, true)) {
                    needsRescue = true;
                } else {
                    // Check if ghost is in a disconnected pocket area
                    // (e.g., x=0-4 at y=10-12 or y=16-18, which are walkable but unreachable)
                    // Quick check: can we BFS to a known-good tile? Do this sparingly.
                    if (!ghost._lastSafeCheck || ghost._lastSafeCheck <= 0) {
                        ghost._lastSafeCheck = 2.0; // check every 2 seconds, not every frame
                        if (bfsDist(gx, gy, 14, 11) === Infinity) {
                            needsRescue = true;
                            console.warn(`Ghost ${ghost.name} stuck in isolated area at (${gx}, ${gy})`);
                        }
                    } else {
                        ghost._lastSafeCheck -= deltaTime;
                    }
                }
                if (needsRescue) {
                    console.warn(`Ghost ${ghost.name} rescued from invalid position (${ghost.tileX}, ${ghost.tileY})`);
                    ghost.tileX = 13;
                    ghost.tileY = 11;
                    ghost.pixelProgress = 0;
                    ghost.direction = 'LEFT';
                    ghost.lastDirection = 'LEFT';
                    ghost.canReverse = true;
                    ghost._lastSafeCheck = 2.0;
                }
            }

            if (ghost.state === 'CAGE') {
                ghost.releaseCounter += deltaTime;
                if (ghost.releaseCounter >= ghost.releaseTime) {
                    ghost.state = 'EXITING';
                }
                return;
            }

            if (ghost.state === 'EXITING') {
                if (ghost.tileY > 11) {
                    ghost.tileY -= 4 * deltaTime;
                } else {
                    ghost.state = 'SCATTER';
                    ghost.tileX = 13;
                    ghost.tileY = 11;
                    ghost.pixelProgress = 0;
                    ghost.direction = 'LEFT';
                    ghost.lastDirection = 'LEFT';
                    ghost.canReverse = true;
                }
                return;
            }

            if (ghost.state === 'EATEN') {
                const cageX = 13, cageY = 12;
                const dist = Math.hypot(ghost.tileX - cageX, ghost.tileY - cageY);
                if (dist < 0.5) {
                    ghost.state = 'CAGE';
                    ghost.releaseCounter = ghost.releaseTime > 0 ? ghost.releaseTime - 15 : -15; // wait 15 seconds
                    ghost.tileX = ghost.startX;
                    ghost.tileY = ghost.startY;
                    ghost.frightened = false;
                    return;
                }
                const angle = Math.atan2(cageY - ghost.tileY, cageX - ghost.tileX);
                ghost.tileX += Math.cos(angle) * 10 * deltaTime;
                ghost.tileY += Math.sin(angle) * 10 * deltaTime;
                return;
            }

            // Vision-cone awareness: ghost only chases if player is inside
            // the actual rendered trapezoid cone (not just the forward hemisphere).
            // Cone shape: nearW=0.45 tiles at ghost, spreads to coneHalfW=1.2 tiles at 5-tile range.
            ghost.aware = false;
            if (!ghost.frightened) {
                const gdelta = dirToDelta(ghost.direction);
                const dxP = player.tileX - ghost.tileX;
                const dyP = player.tileY - ghost.tileY;
                // Forward distance along the ghost's facing direction
                const forwardDist = gdelta.dx * dxP + gdelta.dy * dyP;
                // Lateral (perpendicular) distance from the cone's center line
                // Perpendicular vector is (-dy, dx) of the direction
                const lateralDist = Math.abs(-gdelta.dy * dxP + gdelta.dx * dyP);
                // Player must be in front and within 5-tile range
                // Check range: must be within vision distance (wall-blocked)
                const maxVisTiles = getVisionDistTiles(ghost.tileX, ghost.tileY, ghost.direction);
                if (forwardDist > 0 && forwardDist <= maxVisTiles) {
                    // Cone half-width at this forward distance (narrow: fits in 1-tile corridor)
                    const nearW = 0.25;
                    const farW = 0.45;
                    const coneWidthAtDist = nearW + (farW - nearW) * (forwardDist / 5);
                    if (lateralDist <= coneWidthAtDist) {
                        // Final check: line of sight — walls block vision
                        if (hasLineOfSight(ghost.tileX, ghost.tileY, player.tileX, player.tileY)) {
                            ghost.aware = true;
                        }
                    }
                }
            }

            // Stealth-based mode: ghosts patrol (SCATTER) by default.
            // They only CHASE when they've spotted the player in their vision cone.
            // Detection triggers a 15-second ALARMED state where the ghost pursues the player.
            // Level 4+: alarm is shared globally with ring-based cascade.
            if (ghost.aware && !ghost.alarmed) {
                // Just spotted the player — enter alarmed state
                activateGhostAlarm(ghost);
                // Any ghost spotting the player resets global timer to 15
                if (gameState.level >= 4 && gameState.alarmActive) {
                    gameState.alarmTimer = 15.0;
                }
            } else if (ghost.aware && ghost.alarmed && gameState.level >= 4) {
                // Ghost re-spots the player while already alarmed — reset global timer to 15
                gameState.alarmTimer = 15.0;
            }

            if (ghost.alarmed) {
                ghost.mode = 'CHASE';
                // On levels < 4, use per-ghost timer (original behavior)
                if (gameState.level < 4) {
                    ghost.alarmTimer -= deltaTime;
                    if (ghost.alarmTimer <= 0) {
                        deactivateGhostAlarm(ghost);
                    }
                }
                // On level 4+, the global timer in update() handles expiration
            } else {
                ghost.mode = 'SCATTER';
            }

            // Scatter ghosts move slower — easier to catch from behind
            let speed = ghost.frightened ? (ghost.speed * 0.6) : ghost.speed;
            if (ghost.mode === 'SCATTER') speed *= 0.85;

            // Tile-to-tile ghost movement using pixelProgress
            if (!ghost.pixelProgress) ghost.pixelProgress = 0;

            // Stop-and-look-around: ghost pauses and scans open directions
            if (ghost.pauseTimer > 0) {
                ghost.pauseTimer -= deltaTime;
                if (ghost.lookingAround && ghost.lookDirs && ghost.lookDirs.length > 0) {
                    // Cycle through open directions evenly across the pause
                    const totalLookTime = 3.0; // total pause duration
                    const elapsed = totalLookTime - ghost.pauseTimer;
                    const perDir = totalLookTime / ghost.lookDirs.length;
                    const dirIdx = Math.min(Math.floor(elapsed / perDir), ghost.lookDirs.length - 1);
                    ghost.direction = ghost.lookDirs[dirIdx];
                }
                if (ghost.pauseTimer <= 0) {
                    // Done looking around — resume patrol
                    ghost.lookingAround = false;
                    ghost.canReverse = true;
                }
                return;
            }

            if (ghost.pixelProgress === 0) {
                const tileX = ghost.tileX;
                const tileY = ghost.tileY;

                if (ghost.frightened) {
                    let directions = ['UP', 'DOWN', 'LEFT', 'RIGHT'].filter(d => {
                        const newTile = moveInDir(tileX, tileY, d);
                        return isWalkable(newTile.x, newTile.y, true) && d !== oppositeDir(ghost.lastDirection);
                    });
                    // Dead end: allow reverse as last resort
                    if (directions.length === 0) {
                        directions = ['UP', 'DOWN', 'LEFT', 'RIGHT'].filter(d => {
                            const newTile = moveInDir(tileX, tileY, d);
                            return isWalkable(newTile.x, newTile.y, true);
                        });
                    }
                    if (directions.length > 0) {
                        ghost.direction = directions[Math.floor(Math.random() * directions.length)];
                    }
                } else if (ghost.mode === 'CHASE') {
                    // ═══ INTERSECTION-BASED CHASE ═══
                    // Ghost only recalculates path at intersections (3+ walkable exits).
                    // In corridors/corners, it follows the only available non-reverse path.
                    // This eliminates oscillation: the ghost commits to a path segment
                    // between intersections, and only re-evaluates at decision points.
                    const allWalkable = ['UP','DOWN','LEFT','RIGHT'].filter(d => {
                        const t = moveInDir(tileX, tileY, d);
                        return isWalkable(t.x, t.y, true);
                    });
                    const isIntersection = allWalkable.length >= 3;

                    if (isIntersection || ghost.canReverse) {
                        // Decision point (or first move after alarm trigger):
                        // BFS to the player's CURRENT location, pick best direction
                        let best = bfsDirection(tileX, tileY, player.tileX, player.tileY, ghost.lastDirection, ghost.canReverse);
                        // Safety: verify the chosen direction is actually walkable
                        const nextTile = moveInDir(tileX, tileY, best);
                        if (!isWalkable(nextTile.x, nextTile.y, true)) {
                            best = allWalkable.length > 0 ? allWalkable[0] : ghost.direction;
                        }
                        ghost.direction = best;
                    } else {
                        // Corridor, corner, or dead end: no decision to make.
                        // Take the only non-reverse walkable direction.
                        const nonReverse = allWalkable.filter(d => d !== oppositeDir(ghost.lastDirection));
                        if (nonReverse.length > 0) {
                            ghost.direction = nonReverse[0];
                        } else if (allWalkable.length > 0) {
                            // Dead end — must reverse (only option)
                            ghost.direction = allWalkable[0];
                        }
                        // (if allWalkable is empty, ghost keeps current direction — sanity check will rescue)
                    }
                    ghost.lastDirection = ghost.direction;
                    ghost.canReverse = false;
                } else {
                    // ═══ SCATTER MODE (patrol waypoints) — unchanged ═══
                    let target = { x: tileX, y: tileY };
                    const wp = ghost.patrol[ghost.patrolWaypoint];
                    target = { x: wp.x, y: wp.y };
                    // Check if ghost has reached the current waypoint
                    if (tileX === wp.x && tileY === wp.y) {
                        // Pause at stop waypoints: scan all open paths
                        if (wp.stop && ghost.pauseTimer <= 0) {
                            ghost.pauseTimer = 3.0;
                            ghost.lookingAround = true;
                            ghost.preStopDirection = ghost.direction;
                            const openDirs = ['UP','DOWN','LEFT','RIGHT'].filter(d => {
                                if (d === ghost.direction) return false;
                                const adj = moveInDir(tileX, tileY, d);
                                return isWalkable(adj.x, adj.y, true);
                            });
                            ghost.lookDirs = openDirs.length > 0 ? openDirs : [oppositeDir(ghost.direction)];
                            ghost.direction = ghost.lookDirs[0];
                            ghost.patrolWaypoint = (ghost.patrolWaypoint + 1) % ghost.patrol.length;
                            return;
                        }
                        ghost.patrolWaypoint = (ghost.patrolWaypoint + 1) % ghost.patrol.length;
                        const nextWp = ghost.patrol[ghost.patrolWaypoint];
                        target = { x: nextWp.x, y: nextWp.y };
                    }

                    // BFS toward next waypoint (no-reverse rule)
                    let best = bfsDirection(tileX, tileY, target.x, target.y, ghost.lastDirection, ghost.canReverse);
                    const nextTile = moveInDir(tileX, tileY, best);
                    if (!isWalkable(nextTile.x, nextTile.y, true)) {
                        const safeDirs = ['UP','DOWN','LEFT','RIGHT'].filter(d => {
                            const t = moveInDir(tileX, tileY, d);
                            return isWalkable(t.x, t.y, true);
                        });
                        best = safeDirs.length > 0 ? safeDirs[0] : ghost.direction;
                    }
                    ghost.direction = best;
                    ghost.lastDirection = best;
                    ghost.canReverse = false;
                }
            }

            // Move toward next tile
            ghost.pixelProgress += speed * deltaTime;

            if (ghost.pixelProgress >= 1.0) {
                ghost.pixelProgress = 0;
                const d = dirToDelta(ghost.direction);
                let newX = ghost.tileX + d.dx;
                let newY = ghost.tileY + d.dy;
                // Tunnel wrapping — only at the designated tunnel row
                if (newY === TUNNEL_ROW) {
                    if (newX < 0) newX = MAZE_WIDTH - 1;
                    if (newX >= MAZE_WIDTH) newX = 0;
                }
                // ═══ SAFETY LAYER 2: Validate BEFORE committing the move ═══
                // Only move if the destination tile is actually walkable
                if (newX >= 0 && newX < MAZE_WIDTH && newY >= 0 && newY < MAZE_HEIGHT && isWalkable(newX, newY, true)) {
                    ghost.tileX = newX;
                    ghost.tileY = newY;
                } else {
                    // Destination is a wall or out of bounds — ABORT the move.
                    // Ghost stays on current tile. Do NOT set canReverse — that causes
                    // oscillation. bfsDirection's last-resort fallback already tries all
                    // directions (including reverse) if no non-reverse path exists.
                    console.warn(`Ghost ${ghost.name} blocked from moving ${ghost.direction} to (${newX}, ${newY})`);
                    ghost.pixelProgress = 0;
                }
            }
        }

        function moveInDir(x, y, dir) {
            let nx = x, ny = y;
            if (dir === 'UP') ny--;
            else if (dir === 'DOWN') ny++;
            else if (dir === 'LEFT') nx--;
            else if (dir === 'RIGHT') nx++;
            // Tunnel wrapping at designated row
            if (ny === TUNNEL_ROW) {
                if (nx < 0) nx = MAZE_WIDTH - 1;
                if (nx >= MAZE_WIDTH) nx = 0;
            }
            return { x: nx, y: ny };
        }

        function oppositeDir(dir) {
            const opp = { 'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT' };
            return opp[dir];
        }

        // BFS pathfinding: returns the best first direction to reach (targetX, targetY)
        // from (startX, startY), respecting the no-reverse constraint on lastDir.
        function bfsDirection(startX, startY, targetX, targetY, lastDir, allowReverse) {
            if (startX === targetX && startY === targetY) return lastDir;
            const dirs = ['UP', 'DOWN', 'LEFT', 'RIGHT'];
            const deltas = { 'UP': [0,-1], 'DOWN': [0,1], 'LEFT': [-1,0], 'RIGHT': [1,0] };
            let bestDir = null;
            let bestDist = Infinity;
            let anyWalkableDir = null; // fallback: any direction that's at least walkable
            for (const d of dirs) {
                if (!allowReverse && d === oppositeDir(lastDir)) continue;
                let nx = startX + deltas[d][0];
                const ny = startY + deltas[d][1];
                if (ny === TUNNEL_ROW) {
                    if (nx < 0) nx = MAZE_WIDTH - 1;
                    if (nx >= MAZE_WIDTH) nx = 0;
                }
                if (!isWalkable(nx, ny, true)) continue;
                if (!anyWalkableDir) anyWalkableDir = d;
                const dist = bfsDist(nx, ny, targetX, targetY);
                if (dist < bestDist) {
                    bestDist = dist;
                    bestDir = d;
                }
            }
            // If BFS found a reachable path, use it
            if (bestDir) return bestDir;
            // No path found — return any walkable direction (NOT lastDir which may be a wall)
            if (anyWalkableDir) return anyWalkableDir;
            // Absolute last resort — try ALL directions including reverse
            for (const d of dirs) {
                let nx = startX + deltas[d][0];
                const ny = startY + deltas[d][1];
                if (ny === TUNNEL_ROW) {
                    if (nx < 0) nx = MAZE_WIDTH - 1;
                    if (nx >= MAZE_WIDTH) nx = 0;
                }
                if (isWalkable(nx, ny, true)) return d;
            }
            return lastDir; // truly stuck (sanity check will rescue)
        }

        // BFS shortest path distance between two tiles (ghost-walkable)
        function bfsDist(sx, sy, tx, ty) {
            if (sx === tx && sy === ty) return 0;
            const visited = new Set();
            const queue = [[sx, sy, 0]];
            visited.add(sy * MAZE_WIDTH + sx);
            const deltas = [[0,-1],[0,1],[-1,0],[1,0]];
            while (queue.length > 0) {
                const [x, y, dist] = queue.shift();
                for (const [dx, dy] of deltas) {
                    let nx = x + dx, ny = y + dy;
                    // Only allow x-wrapping at the tunnel row
                    if (ny === TUNNEL_ROW) {
                        if (nx < 0) nx = MAZE_WIDTH - 1;
                        if (nx >= MAZE_WIDTH) nx = 0;
                    }
                    if (ny < 0 || ny >= MAZE_HEIGHT) continue;
                    if (nx < 0 || nx >= MAZE_WIDTH) continue;
                    if (!isWalkable(nx, ny, true)) continue;
                    const key = ny * MAZE_WIDTH + nx;
                    if (visited.has(key)) continue;
                    if (nx === tx && ny === ty) return dist + 1;
                    visited.add(key);
                    queue.push([nx, ny, dist + 1]);
                }
            }
            return Infinity; // unreachable
        }

        function checkCollisions() {
            if (gameState.deathPauseTimer > 0) return; // already dying
            const delta = dirToDelta(player.direction);
            const progress = player.stopped ? 0 : player.pixelProgress;
            const px = player.tileX + delta.dx * progress;
            const py = player.tileY + delta.dy * progress;
            let died = false;
            for (let idx = 0; idx < ghosts.length; idx++) {
                if (died) break;
                const ghost = ghosts[idx];
                if (ghost.state === 'CAGE' || ghost.state === 'EXITING' || ghost.state === 'EATEN') continue;
                const dist = Math.hypot(px - ghost.tileX, py - ghost.tileY);
                if (dist < 0.7) {
                    if (ghost.frightened || gameState.powerUpActive) {
                        let killMoney = [200, 400, 800, 1600][Math.min(idx, 3)];
                        if (getUpgradeCount('bounty') > 0) killMoney *= 2; // Bounty Hunter
                        gameState.money += killMoney;
                        gameState.ghostsKilled++;
                        gameState.moneyEarned += killMoney;
                        playGhostEaten();
                        ghost.state = 'EATEN';
                        ghost.frightened = false;
                    } else if (upgradeEffects.cloakTimer > 0) {
                        // Ghost Cloak active — ghosts pass through harmlessly
                        // But player can still stealth kill if moving and behind ghost
                        if (!player.stopped && !isGhostFacingPlayer(ghost)) {
                            performStealthKill(ghost);
                        }
                    } else if (player.stopped) {
                        // Player is standing still — they can't stealth kill.
                        if (tryArmorAbsorb()) {
                            // Armor saved the player — push away from ghost
                            continue;
                        }
                        playerDeath();
                        died = true;
                    } else if (isGhostFacingPlayer(ghost) && !(getUpgradeCount('widekill') > 0)) {
                        // Ghost's front is toward the player — ghost wins
                        // (unless Wider Kill Angle lets the player kill from wider angles)
                        if (tryArmorAbsorb()) continue;
                        playerDeath();
                        died = true;
                    } else {
                        // Ghost is NOT facing the player AND player is moving:
                        // - Player's front → ghost's back/side = stealth kill
                        // - Neither facing (side-swipe) = stealth kill (ghost unaware)
                        // - With Wider Kill Angle: even front-facing ghosts can be killed
                        performStealthKill(ghost);
                    }
                }
            }
        }

        function performStealthKill(ghost) {
            gameState.sneakCombo++;
            gameState.sneakComboTimer = 10;
            const comboMult = Math.min(gameState.sneakCombo, 5);
            let sneakMoney = 800 * comboMult;
            if (getUpgradeCount('bounty') > 0) sneakMoney *= 2; // Bounty Hunter
            gameState.money += sneakMoney;
            gameState.ghostsKilled++;
            gameState.moneyEarned += sneakMoney;
            gameState.lastSneakMoney = sneakMoney;
            // Trigger knife attack animation
            player.animState = 'attack';
            player.animFrame = 0;
            player.animTimer = 0;
            // Face the ghost for the kill
            const gd2 = dirToDelta(ghost.direction);
            const gp2 = ghost.pixelProgress || 0;
            const gx = ghost.tileX + gd2.dx * gp2;
            const gy = ghost.tileY + gd2.dy * gp2;
            const dxToGhost = gx - player.tileX;
            const dyToGhost = gy - player.tileY;
            if (Math.abs(dxToGhost) > Math.abs(dyToGhost)) {
                player.lastFacing = dxToGhost > 0 ? 'RIGHT' : 'LEFT';
            } else {
                player.lastFacing = dyToGhost > 0 ? 'DOWN' : 'UP';
            }
            // Floating score text
            const gd = dirToDelta(ghost.direction);
            const gp = ghost.pixelProgress || 0;
            showFloatingText(
                (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2,
                (ghost.tileY + gd.dy * gp) * TILE_SIZE,
                '+$' + sneakMoney + (comboMult > 1 ? ' x' + comboMult + ' COMBO!' : ' STEALTH!')
            );
            playSneakAttack();
            screenFlash();
            ghost.state = 'EATEN';
            ghost.frightened = false;
        }

        function isGhostFacingPlayer(ghost) {
            // Ghost "faces" the player only if the player is within a ~90° forward cone
            // (45° each side of the ghost's facing direction).
            // Outside this cone = side or behind = stealth kill opportunity.
            const gd = dirToDelta(ghost.direction);
            const gp = ghost.pixelProgress || 0;
            const gx = ghost.tileX + gd.dx * gp;
            const gy = ghost.tileY + gd.dy * gp;
            const pd = dirToDelta(player.direction);
            const pp = player.stopped ? 0 : player.pixelProgress;
            const px = player.tileX + pd.dx * pp;
            const py = player.tileY + pd.dy * pp;
            const dx = px - gx;
            const dy = py - gy;
            const dist = Math.hypot(dx, dy);

            // At very close range (overlapping/same tile), sub-pixel positions are
            // unreliable. Fall back to tile-level check: was the ghost moving toward
            // the player's tile? If so, it walked into them face-first.
            if (dist < 0.3) {
                const tdx = player.tileX - ghost.tileX;
                const tdy = player.tileY - ghost.tileY;
                // Ghost on same tile, or ghost's direction points toward player's tile
                const tileDot = gd.dx * tdx + gd.dy * tdy;
                return tileDot >= 0;
            }

            // Forward distance: how far in front of the ghost the player is
            const forwardDist = gd.dx * dx + gd.dy * dy;
            // Lateral distance: how far to the side of the ghost's center line
            const lateralDist = Math.abs(-gd.dy * dx + gd.dx * dy);

            if (forwardDist <= 0) return false; // player is behind or exactly beside

            // Player is "in front" only if more forward than sideways (45° half-angle)
            return forwardDist > lateralDist;
        }

        function isPlayerFacingGhost(ghost) {
            const pDir = player.direction !== 'NONE' ? player.direction : player.lastFacing;
            const pd = dirToDelta(pDir);
            const pp = player.stopped ? 0 : player.pixelProgress;
            const px = player.tileX + pd.dx * pp;
            const py = player.tileY + pd.dy * pp;
            const gd = dirToDelta(ghost.direction);
            const gp = ghost.pixelProgress || 0;
            const gx = ghost.tileX + gd.dx * gp;
            const gy = ghost.tileY + gd.dy * gp;
            const dx = gx - px;
            const dy = gy - py;
            return (pd.dx * dx + pd.dy * dy) > 0;
        }

        function canMoveTo(x, y, dir) {
            const newPos = moveInDir(x, y, dir);
            return isWalkable(Math.round(newPos.x), Math.round(newPos.y));
        }

        const TUNNEL_ROW = 14; // only row where x-wrapping (tunnel) is allowed

        function isWalkable(x, y, isGhost = false, allowHouse = false) {
            // Handle tunnel wrapping at the designated tunnel row
            if (y === TUNNEL_ROW) {
                if (x < 0) x = MAZE_WIDTH - 1;
                if (x >= MAZE_WIDTH) x = 0;
            }
            if (x < 0 || x >= MAZE_WIDTH || y < 0 || y >= MAZE_HEIGHT) return false;
            const cell = MAZE[y][x];
            if (isGhost) {
                if (cell === 1) return false; // walls always block
                if ((cell === 4 || cell === 5) && !allowHouse) return false; // ghost house blocked during patrol
                return true;
            }
            // If cage door is hacked, player can walk through door (5) and cage interior (4)
            if (cageDoorHack.hacked && (cell === 4 || cell === 5)) return true;
            return cell !== 1 && cell !== 4 && cell !== 5; // player blocked from house
        }

        // Floating score text system
        let floatingTexts = [];
        function showFloatingText(x, y, text) {
            floatingTexts.push({ x, y, text, timer: 2.0, startY: y });
        }
        function updateFloatingTexts(deltaTime) {
            floatingTexts.forEach(ft => {
                ft.timer -= deltaTime;
                ft.y = ft.startY - (2.0 - ft.timer) * 30; // float upward
            });
            floatingTexts = floatingTexts.filter(ft => ft.timer > 0);
        }
        function renderFloatingTexts() {
            floatingTexts.forEach(ft => {
                const alpha = Math.min(1, ft.timer);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#FFD700';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.font = 'bold 14px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                ctx.strokeText(ft.text, ft.x, ft.y);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            });
        }

        // ============= LASER PULSE SYSTEM (Level 6) =============
        let laserPulses = [];
        let laserGhostsHit = 0; // escalating score counter per life

        function fireRifle() {
            if (!player.armed || player.ammo <= 0) return;
            if (gameState.deathPauseTimer > 0 || gameState.readyCounter > 0) return;
            if (gameState.levelAnnounce > 0) return;
            player.ammo--;
            // Shoot animation
            player.animState = 'attack';
            player.animFrame = 0;
            player.animTimer = 0;
            playRifleShot();
            // Spawn laser pulse from player position in facing direction
            const dir = player.direction !== 'NONE' ? player.direction : player.lastFacing;
            const delta = dirToDelta(player.direction);
            const progress = player.stopped ? 0 : player.pixelProgress;
            const px = (player.tileX + delta.dx * progress) * TILE_SIZE + TILE_SIZE / 2;
            const py = (player.tileY + delta.dy * progress) * TILE_SIZE + TILE_SIZE / 2;
            const ld = dirToDelta(dir);
            laserPulses.push({
                x: px, y: py,
                dx: ld.dx, dy: ld.dy,
                speed: player.speed * 3 * TILE_SIZE, // 3x player speed in pixels/sec
                life: 3.0, // max lifetime seconds (safety)
                sparkTimer: 0
            });
        }

        function updateLaserPulses(deltaTime) {
            for (let i = laserPulses.length - 1; i >= 0; i--) {
                const lp = laserPulses[i];
                lp.x += lp.dx * lp.speed * deltaTime;
                lp.y += lp.dy * lp.speed * deltaTime;
                lp.life -= deltaTime;
                lp.sparkTimer += deltaTime;

                // Check wall collision (tile the laser center is in)
                const tileX = Math.floor(lp.x / TILE_SIZE);
                const tileY = Math.floor(lp.y / TILE_SIZE);
                // Out of bounds or hit wall = remove
                if (tileX < 0 || tileX >= MAZE_WIDTH || tileY < 0 || tileY >= MAZE_HEIGHT ||
                    MAZE[tileY][tileX] === 1 || lp.life <= 0) {
                    laserPulses.splice(i, 1);
                    continue;
                }

                // Check ghost collisions (laser passes through, hitting all in path)
                for (let g = 0; g < ghosts.length; g++) {
                    const ghost = ghosts[g];
                    if (ghost.state === 'CAGE' || ghost.state === 'EXITING' || ghost.state === 'EATEN') continue;
                    const gd = dirToDelta(ghost.direction);
                    const gp = ghost.pixelProgress || 0;
                    const gx = (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2;
                    const gy = (ghost.tileY + gd.dy * gp) * TILE_SIZE + TILE_SIZE / 2;
                    const dist = Math.hypot(lp.x - gx, lp.y - gy);
                    if (dist < TILE_SIZE * 0.7) {
                        // Ghost hit!
                        const moneyTable = [200, 400, 800, 1600];
                        let hitMoney = moneyTable[Math.min(laserGhostsHit, 3)];
                        if (getUpgradeCount('bounty') > 0) hitMoney *= 2;
                        laserGhostsHit++;
                        gameState.money += hitMoney;
                        playGhostEaten();
                        ghost.state = 'EATEN';
                        ghost.frightened = false;
                        showFloatingText(gx, gy - TILE_SIZE, '+$' + hitMoney + ' SHOT!');
                        // Laser passes through — don't remove or break
                    }
                }
            }
        }

        function renderLaserPulses() {
            if (laserPulses.length === 0) return;
            ctx.save();
            laserPulses.forEach(lp => {
                const glow = 0.7 + Math.sin(Date.now() / 50) * 0.3;
                const beamLen = TILE_SIZE * 2.5; // long laser beam
                // Tail position (behind the head)
                const tailX = lp.x - lp.dx * beamLen;
                const tailY = lp.y - lp.dy * beamLen;
                // Outer glow beam (wide, faint)
                ctx.strokeStyle = 'rgba(50, 150, 255, ' + (glow * 0.3).toFixed(2) + ')';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(lp.x, lp.y);
                ctx.stroke();
                // Core beam (bright blue)
                ctx.strokeStyle = 'rgba(80, 200, 255, ' + glow.toFixed(2) + ')';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(lp.x, lp.y);
                ctx.stroke();
                // Hot white center line
                ctx.strokeStyle = 'rgba(220, 245, 255, 0.9)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(lp.x, lp.y);
                ctx.stroke();
                // Bright tip
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.beginPath();
                ctx.arc(lp.x, lp.y, 3, 0, Math.PI * 2);
                ctx.fill();
                // Sparkles along beam
                ctx.fillStyle = 'rgba(180, 230, 255, ' + (glow * 0.7).toFixed(2) + ')';
                for (let s = 0; s < 5; s++) {
                    const t = (s + (Date.now() % 200) / 200) / 5;
                    const sx = lp.x - lp.dx * beamLen * t;
                    const sy = lp.y - lp.dy * beamLen * t;
                    const sparkOff = Math.sin(Date.now() / 30 + s * 2) * 3;
                    ctx.beginPath();
                    ctx.arc(sx + lp.dy * sparkOff, sy - lp.dx * sparkOff, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.restore();
        }

        function playRifleShot() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            // Sharp attack noise burst
            const bufSize = audioCtx.sampleRate * 0.08;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buf;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 2000;
            filter.Q.value = 1.5;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start(now);
            noise.stop(now + 0.08);
            // Laser "pew" tone
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
            oscGain.gain.setValueAtTime(0.15, now);
            oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        }

        // Enhanced screen flash with color support and fade
        let screenFlashState = { timer: 0, color: 'rgba(255,255,255,0.8)', duration: 0.15 };
        function screenFlash(color) {
            screenFlashState.color = color || 'rgba(255, 255, 255, 0.8)';
            screenFlashState.timer = screenFlashState.duration;
        }
        function renderScreenFlash(dt) {
            if (screenFlashState.timer > 0) {
                const alpha = Math.min(1, screenFlashState.timer / screenFlashState.duration);
                ctx.save();
                ctx.globalAlpha = alpha * 0.8;
                ctx.fillStyle = screenFlashState.color;
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.restore();
                screenFlashState.timer -= dt;
            }
        }

        // EMP pulse ring effect — double pulse, thick blue line, 6-tile radius
        var EMP_PULSE_MAX_RADIUS = 6 * TILE_SIZE; // 6 tiles = 120px
        var EMP_PULSE_SPEED = 400; // px per second expansion
        let empPulseState = {
            active: false, cx: 0, cy: 0,
            ring1: { radius: 0, active: false },
            ring2: { radius: 0, active: false },
            ring2Delay: 0.08 // second ring starts slightly after first
        };
        function triggerEMPPulse(cx, cy) {
            empPulseState.active = true;
            empPulseState.cx = cx;
            empPulseState.cy = cy;
            empPulseState.ring1 = { radius: 0, active: true };
            empPulseState.ring2 = { radius: 0, active: false };
            empPulseState.ring2Delay = 0.08;
        }
        function renderEMPPulse(dt) {
            if (!empPulseState.active) return;
            var maxR = EMP_PULSE_MAX_RADIUS;
            var speed = EMP_PULSE_SPEED;
            // Update ring 1
            if (empPulseState.ring1.active) {
                empPulseState.ring1.radius += dt * speed;
                if (empPulseState.ring1.radius >= maxR) empPulseState.ring1.active = false;
            }
            // Delay then start ring 2
            if (empPulseState.ring2Delay > 0) {
                empPulseState.ring2Delay -= dt;
                if (empPulseState.ring2Delay <= 0) empPulseState.ring2 = { radius: 0, active: true };
            }
            if (empPulseState.ring2.active) {
                empPulseState.ring2.radius += dt * speed;
                if (empPulseState.ring2.radius >= maxR) empPulseState.ring2.active = false;
            }
            // Both rings done?
            if (!empPulseState.ring1.active && !empPulseState.ring2.active && empPulseState.ring2Delay <= 0) {
                empPulseState.active = false;
                return;
            }
            ctx.save();
            // Draw each ring
            var rings = [empPulseState.ring1, empPulseState.ring2];
            for (var ri = 0; ri < rings.length; ri++) {
                var ring = rings[ri];
                if (!ring.active || ring.radius <= 0) continue;
                var progress = ring.radius / maxR;
                var alpha = 1.0 - progress;
                // Thick blue line stroke
                ctx.strokeStyle = 'rgba(80, 180, 255, ' + (alpha * 0.85).toFixed(3) + ')';
                ctx.lineWidth = 4 + (1 - progress) * 3; // thick: 7 at start, 4 at end
                ctx.beginPath();
                ctx.arc(empPulseState.cx, empPulseState.cy, ring.radius, 0, Math.PI * 2);
                ctx.stroke();
                // Bright inner edge glow
                ctx.strokeStyle = 'rgba(200, 235, 255, ' + (alpha * 0.5).toFixed(3) + ')';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(empPulseState.cx, empPulseState.cy, ring.radius - 3, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
        }

        // Phase shift trail particles
        let phaseTrailParticles = [];
        function triggerPhaseTrail(fromX, fromY, toX, toY) {
            const steps = 8;
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                phaseTrailParticles.push({
                    x: fromX + (toX - fromX) * t + (Math.random() - 0.5) * 10,
                    y: fromY + (toY - fromY) * t + (Math.random() - 0.5) * 10,
                    life: 0.5 + Math.random() * 0.3,
                    maxLife: 0.5 + Math.random() * 0.3,
                    size: 2 + Math.random() * 3
                });
            }
        }
        function renderPhaseTrail(dt) {
            for (let i = phaseTrailParticles.length - 1; i >= 0; i--) {
                const p = phaseTrailParticles[i];
                p.life -= dt;
                if (p.life <= 0) { phaseTrailParticles.splice(i, 1); continue; }
                const alpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha * 0.8;
                ctx.fillStyle = '#6CF';
                ctx.shadowColor = '#6CF';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Armor break particle burst
        let armorBreakParticles = [];
        function triggerArmorBreak(cx, cy) {
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
                const speed = 60 + Math.random() * 80;
                armorBreakParticles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.6 + Math.random() * 0.3,
                    maxLife: 0.6 + Math.random() * 0.3,
                    size: 2 + Math.random() * 2,
                    color: Math.random() > 0.5 ? '#F90' : '#FF0'
                });
            }
        }
        function renderArmorBreak(dt) {
            for (let i = armorBreakParticles.length - 1; i >= 0; i--) {
                const p = armorBreakParticles[i];
                p.life -= dt;
                if (p.life <= 0) { armorBreakParticles.splice(i, 1); continue; }
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 120 * dt; // gravity
                const alpha = p.life / p.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                ctx.restore();
            }
        }

        function playerDeath() {
            diagDeathsThisFrame++;
            diagStats.totalDeaths++;
            gameState.lives--;
            saveMoney();
            playDeath();
            // Trigger die animation
            player.animState = 'die';
            player.animFrame = 0;
            player.animTimer = 0;
            player.stopped = true;
            player.direction = 'NONE';
            // Pause for death animation (~0.9s for 9 frames at 0.1s each), then reset
            gameState.deathPauseTimer = 1.0;
            if (gameState.lives <= 0) {
                gameState.deathCallback = function() { gameOver(); };
            } else {
                gameState.deathCallback = function() {
                    // Show upgrade shop before respawn
                    gameState.shopPendingRespawn = doRespawn;
                    openShop();
                };
            }
        }

        function doRespawn() {
            if (gameState.level >= 8) {
                player.tileX = 14;
                player.tileY = 29; // bottom center of tower
            } else if (gameState.level >= 7) {
                player.tileX = 1;
                player.tileY = 14; // near left warp tunnel
            } else if (gameState.level >= 5) {
                player.tileX = 14;
                player.tileY = 11;
            } else {
                player.tileX = 14;
                player.tileY = 23;
            }
            player.pixelProgress = 0;
            player.direction = 'NONE';
            player.lastFacing = 'DOWN';
            player.nextDirection = 'NONE';
            player.coasting = false;
            player.stopped = true;
            player.animState = 'idle';
            player.animFrame = 0;
            player.armed = false;
            player.ammo = 0;
            laserPulses = [];
            laserGhostsHit = 0;
            snapCamera();
            gameState.readyCounter = 2;
            gameState.alarmActive = false;
            gameState.alarmTimer = 0;
            gameState.alarmBroadcastTimer = 0;
            gameState.alarmRings = [];
            var respawnPatrolPaths = gameState.level >= 8 ? PATROL_PATHS_L8 : PATROL_PATHS;
            ghosts.forEach((g, idx) => {
                // Level 5+: ghosts respawn at patrol positions, not in cage
                if (gameState.level >= 5) {
                    let wp = 0;
                    if (idx >= 4) {
                        wp = Math.floor(respawnPatrolPaths[g.patrolIndex].length / 2);
                    }
                    const patrolPos = respawnPatrolPaths[g.patrolIndex][wp];
                    g.tileX = patrolPos.x;
                    g.tileY = patrolPos.y;
                    g.patrol = respawnPatrolPaths[g.patrolIndex];
                    g.state = 'SCATTER';
                    g.releaseCounter = g.releaseTime;
                    g.patrolWaypoint = wp;
                } else {
                    g.state = 'CAGE';
                    g.releaseCounter = 0;
                    g.tileX = g.startX;
                    g.tileY = g.startY;
                    g.patrolWaypoint = 0;
                }
                g.pixelProgress = 0;
                g.direction = 'RIGHT';
                g.lastDirection = 'RIGHT';
                g.canReverse = true;
                g.mode = 'SCATTER';
                g.modeTimer = 0;
                g.frightened = false;
                g.frightenedTimer = 0;
                g.aware = false;
                g.chaseTimer = 0;
                g.alarmed = false;
                g.alarmTimer = 0;
                g.pauseTimer = 0;
                g.lookingAround = false;
                g.lookPhase = 0;
                g.preStopDirection = 'RIGHT';
                g._broadcastElapsed = undefined;
                g._ringTimer = undefined;
            });
        }

        // ============= UPGRADE SHOP =============
        let shopButtons = [];
        let shopOffering = []; // 3 UPGRADE_DEFS indices currently on offer
        let shopScrollY = 0;  // for "your upgrades" section if needed

        function openShop() {
            gameState.showShop = true;
            shopButtons = [];
            shopScrollY = 0;
            // Pick 3 random upgrades to offer (no duplicates)
            const pool = [];
            for (let i = 0; i < UPGRADE_DEFS.length; i++) pool.push(i);
            // Shuffle
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
            }
            shopOffering = pool.slice(0, 3);
        }

        // Shared screen background — dark navy with subtle grid + optional accent lines
        function drawScreenBackground(showAccentLines, titleY) {
            ctx.fillStyle = '#0a0e17';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            // Subtle grid texture
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let gx = 0; gx < CANVAS_WIDTH; gx += 40) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, CANVAS_HEIGHT); ctx.stroke();
            }
            for (let gy = 0; gy < CANVAS_HEIGHT; gy += 40) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CANVAS_WIDTH, gy); ctx.stroke();
            }
            if (showAccentLines && titleY !== undefined) {
                const lineW = 120;
                const cx = CANVAS_WIDTH / 2;
                ctx.strokeStyle = 'rgba(255, 153, 0, 0.4)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(cx - lineW, titleY - 12); ctx.lineTo(cx + lineW, titleY - 12); ctx.stroke();
            }
        }

        function drawShopIcon(defIndex, x, y, size) {
            if (!shopIconsImg.complete || !shopIconsImg.naturalWidth) return;
            const srcX = defIndex * SHOP_ICON_SIZE;
            ctx.drawImage(shopIconsImg, srcX, 0, SHOP_ICON_SIZE, SHOP_ICON_SIZE, x, y, size, size);
        }

        // Purchase flash animation state
        let shopFlash = { active: false, slotIndex: -1, startTime: 0 };

        function drawShop() {
            drawScreenBackground(true, 28);

            const cx = CANVAS_WIDTH / 2;
            shopButtons = [];

            ctx.fillStyle = '#F90';
            ctx.font = 'bold 22px Impact, Arial Black, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('U P G R A D E   S H O P', cx, 38);

            // Money — large and clear, this is the key decision number
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('$' + gameState.money, cx, 62);

            // Accent line below money
            var shopLineW = 120;
            ctx.strokeStyle = 'rgba(255, 153, 0, 0.4)';
            ctx.beginPath(); ctx.moveTo(cx - shopLineW, 72); ctx.lineTo(cx + shopLineW, 72); ctx.stroke();

            // ---- CARDS ----
            const cardW = 164;
            const cardH = Math.min(280, CANVAS_HEIGHT - 120);
            const cardGap = 12;
            const totalW = cardW * 3 + cardGap * 2;
            const startX = cx - totalW / 2;
            const cardY = 84;
            const iconSize = Math.min(72, cardH > 200 ? 72 : 48);

            for (let i = 0; i < 3; i++) {
                const defIdx = shopOffering[i];
                const def = UPGRADE_DEFS[defIdx];
                const sx = startX + i * (cardW + cardGap);
                const sy = cardY;
                const affordable = canBuyUpgrade(def);
                const owned = getUpgradeCount(def.id);
                const maxed = owned >= def.maxStacks;

                // --- Purchase flash overlay ---
                const isFlashing = shopFlash.active && shopFlash.slotIndex === i;
                const flashAge = isFlashing ? (Date.now() - shopFlash.startTime) / 400 : 1;
                if (isFlashing && flashAge >= 1) shopFlash.active = false;

                // --- Card background ---
                if (maxed) {
                    ctx.fillStyle = 'rgba(25, 35, 25, 0.85)';
                    ctx.strokeStyle = 'rgba(60, 90, 60, 0.3)';
                    ctx.lineWidth = 1;
                } else if (!affordable) {
                    ctx.fillStyle = 'rgba(30, 25, 30, 0.85)';
                    ctx.strokeStyle = 'rgba(80, 60, 60, 0.25)';
                    ctx.lineWidth = 1;
                } else {
                    ctx.fillStyle = 'rgba(18, 28, 48, 0.9)';
                    ctx.strokeStyle = 'rgba(100, 180, 255, 0.5)';
                    ctx.lineWidth = 2.5;
                }
                ctx.beginPath();
                ctx.roundRect(sx, sy, cardW, cardH, 10);
                ctx.fill();
                ctx.stroke();

                // --- Inner glow for affordable cards ---
                if (affordable && !maxed) {
                    const grd = ctx.createLinearGradient(sx, sy, sx, sy + cardH);
                    grd.addColorStop(0, 'rgba(100, 170, 255, 0.08)');
                    grd.addColorStop(0.5, 'rgba(100, 170, 255, 0)');
                    grd.addColorStop(1, 'rgba(255, 200, 50, 0.05)');
                    ctx.fillStyle = grd;
                    ctx.beginPath();
                    ctx.roundRect(sx + 1, sy + 1, cardW - 2, cardH - 2, 9);
                    ctx.fill();
                }

                // --- Key hint badge (top-right corner) ---
                if (!maxed) {
                    const badgeSize = 22;
                    const bx = sx + cardW - badgeSize - 6;
                    const by = sy + 6;
                    ctx.fillStyle = affordable ? 'rgba(100, 170, 255, 0.2)' : 'rgba(80, 80, 80, 0.2)';
                    ctx.beginPath();
                    ctx.roundRect(bx, by, badgeSize, badgeSize, 4);
                    ctx.fill();
                    ctx.fillStyle = affordable ? 'rgba(150, 200, 255, 0.7)' : 'rgba(100, 100, 100, 0.5)';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('' + (i + 1), bx + badgeSize / 2, by + 16);
                }

                // --- Icon zone (centered, with breathing room) ---
                const iconX = sx + (cardW - iconSize) / 2;
                const iconY = sy + 20;

                // Subtle icon backing circle
                if (affordable && !maxed) {
                    ctx.fillStyle = 'rgba(100, 170, 255, 0.06)';
                    ctx.beginPath();
                    ctx.arc(sx + cardW / 2, iconY + iconSize / 2, iconSize / 2 + 8, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (maxed || !affordable) ctx.globalAlpha = 0.35;
                drawShopIcon(defIdx, iconX, iconY, iconSize);
                ctx.globalAlpha = 1.0;

                // --- Name (the "pull quote" — biggest text on card) ---
                const nameY = iconY + iconSize + 24;
                ctx.fillStyle = maxed ? '#5a7a5a' : (affordable ? '#EEE' : '#776');
                ctx.font = 'bold 15px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(def.name, sx + cardW / 2, nameY);

                // --- Price badge ---
                const priceY = nameY + 20;
                if (maxed) {
                    // Owned pill
                    const pillW = 64, pillH = 20;
                    ctx.fillStyle = 'rgba(60, 100, 60, 0.4)';
                    ctx.beginPath();
                    ctx.roundRect(sx + cardW / 2 - pillW / 2, priceY - 14, pillW, pillH, 10);
                    ctx.fill();
                    ctx.fillStyle = '#6a9a6a';
                    ctx.font = 'bold 11px Arial';
                    ctx.fillText('OWNED', sx + cardW / 2, priceY);
                } else {
                    // Price pill
                    const priceText = '$' + def.cost;
                    const ptw = ctx.measureText(priceText).width;
                    const pillW = ptw + 20, pillH = 22;
                    ctx.fillStyle = affordable ? 'rgba(255, 200, 50, 0.15)' : 'rgba(120, 50, 50, 0.2)';
                    ctx.beginPath();
                    ctx.roundRect(sx + cardW / 2 - pillW / 2, priceY - 15, pillW, pillH, 11);
                    ctx.fill();
                    ctx.fillStyle = affordable ? '#FFD700' : '#c66';
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText(priceText, sx + cardW / 2, priceY + 1);
                }

                // --- Description (word wrap, generous line height) ---
                const descY = priceY + 20;
                ctx.fillStyle = maxed ? '#455' : (affordable ? '#99a8b8' : '#665');
                ctx.font = '11px Arial';
                const words = def.desc.split(' ');
                let line = '';
                let ly = descY;
                for (let w = 0; w < words.length; w++) {
                    const test = line + (line ? ' ' : '') + words[w];
                    if (ctx.measureText(test).width > cardW - 28 && line) {
                        ctx.fillText(line, sx + cardW / 2, ly);
                        ly += 14;
                        line = words[w];
                    } else {
                        line = test;
                    }
                }
                if (line) ctx.fillText(line, sx + cardW / 2, ly);

                // --- Owned count for stackable ---
                if (owned > 0 && def.maxStacks > 1) {
                    ctx.fillStyle = '#7cb87c';
                    ctx.font = 'bold 11px Arial';
                    ctx.fillText('Owned: ' + owned, sx + cardW / 2, sy + cardH - 14);

                    ctx.beginPath();
                    ctx.roundRect(sx, sy, cardW, cardH, 10);
                    ctx.fill();
                }

                shopButtons.push({ x: sx, y: sy, w: cardW, h: cardH, index: i, defIdx: defIdx });

            // ---- SKIP — secondary but visible ----
            const skipY = cardY + cardH + 16;
            const skipW = 120;
            const skipH = 30;
            const skipX = cx - skipW / 2;

            // Subtle pulse so players notice it
            const skipPulse = 0.08 + Math.sin(Date.now() / 800) * 0.04;
            ctx.fillStyle = 'rgba(255, 255, 255, ' + skipPulse.toFixed(3) + ')';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(skipX, skipY, skipW, skipH, 14);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Skip  [S]', cx, skipY + 20);

            shopButtons.push({ x: skipX, y: skipY, w: skipW, h: skipH, index: -1 });

            // ---- Owned upgrades row (if any) — distinct panel ----
            const ownedIds = Object.keys(ownedUpgrades).filter(id => ownedUpgrades[id] > 0);
            if (ownedIds.length > 0) {
                const panelY = skipY + skipH + 12;
                const ownIconSize = 30;
                const ownGap = 6;
                const ownTotalW = ownedIds.length * (ownIconSize + ownGap) - ownGap;
                const panelW = Math.max(ownTotalW + 24, 120);
                const panelH = ownIconSize + 24;
                const panelX = cx - panelW / 2;

                // Panel background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(panelX, panelY, panelW, panelH, 8);
                ctx.fill();
                ctx.stroke();

                // Label
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('OWNED', cx, panelY + 11);

                // Icons
                let ox = cx - ownTotalW / 2;
                const iconRowY = panelY + 14;
                for (let oi = 0; oi < ownedIds.length; oi++) {
                    const oid = ownedIds[oi];
                    const defIdx = UPGRADE_DEFS.findIndex(d => d.id === oid);
                    if (defIdx >= 0) {
                        drawShopIcon(defIdx, ox, iconRowY, ownIconSize);
                        const count = ownedUpgrades[oid];
                        const charges = activeCharges[oid] || 0;
                        const label = UPGRADE_DEFS[defIdx].type === 'active' ? charges.toString() : (count > 1 ? 'x' + count : '');
                        if (label) {
                            ctx.fillStyle = '#FFD700';
                            ctx.font = 'bold 8px Arial';
                            ctx.textAlign = 'right';
                            ctx.fillText(label, ox + ownIconSize + 1, iconRowY + ownIconSize);
                            ctx.textAlign = 'center';
                        }
                    }
                    ox += ownIconSize + ownGap;
                }
            }

            // ---- Lives at very bottom ----
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.roundRect(cx - 100, CANVAS_HEIGHT - 24, 200, 20, 4);
            ctx.fill();
            ctx.fillStyle = '#F66';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            const livesText = '\u2764 '.repeat(Math.min(gameState.lives, 20)).trim();
            ctx.fillText(livesText, cx, CANVAS_HEIGHT - 9);
        }

        // ============= RENDERING =============
        function diagAddLog(msg) {
            const t = (diagStats.framesRun / 60).toFixed(1);
            diagLog.unshift('[' + t + 's] ' + msg);
            if (diagLog.length > DIAG_LOG_MAX) diagLog.pop();
        }

        function runDiagnostics(deltaTime) {
            diagStats.framesRun++;
            ghosts.forEach(ghost => {
                if (ghost.state === 'CAGE' || ghost.state === 'EXITING' || ghost.state === 'EATEN') return;
                const gx = Math.round(ghost.tileX);
                const gy = Math.round(ghost.tileY);

                // Init history tracking
                if (!diagGhostHistory[ghost.name]) {
                    diagGhostHistory[ghost.name] = { positions: [], stuckCounter: 0, lastTileX: -1, lastTileY: -1 };
                }
                const hist = diagGhostHistory[ghost.name];

                // Out of bounds
                if (gx < 0 || gx >= MAZE_WIDTH || gy < 0 || gy >= MAZE_HEIGHT) {
                    diagStats.ghostOutOfBounds++;
                    diagAddLog('OOB: ' + ghost.name + ' at (' + gx + ',' + gy + ')');
                } else {
                    // In wall
                    if (MAZE[gy][gx] === 1) {
                        diagStats.ghostInWall++;
                        diagAddLog('WALL: ' + ghost.name + ' at (' + gx + ',' + gy + ')');
                    }
                    // In ghost house while patrolling/chasing
                    if ((MAZE[gy][gx] === 4 || MAZE[gy][gx] === 5) && (ghost.mode === 'SCATTER' || ghost.mode === 'CHASE')) {
                        diagStats.ghostInHouse++;
                        diagAddLog('HOUSE: ' + ghost.name + ' at (' + gx + ',' + gy + ') mode=' + ghost.mode);
                    }
                }

                // Stuck detection (same tile for 300+ frames = 5 sec)
                if (gx === hist.lastTileX && gy === hist.lastTileY) {
                    hist.stuckCounter++;
                    if (hist.stuckCounter === 300) {
                        diagStats.ghostStuck++;
                        diagAddLog('STUCK: ' + ghost.name + ' at (' + gx + ',' + gy + ') for 5s');
                    }
                } else {
                    hist.stuckCounter = 0;
                    hist.lastTileX = gx;
                    hist.lastTileY = gy;
                }

                // Oscillation detection: track last 10 positions, check A-B-A-B pattern
                hist.positions.push(gx + ',' + gy);
                if (hist.positions.length > 10) hist.positions.shift();
                if (hist.positions.length >= 6) {
                    const p = hist.positions;
                    const len = p.length;
                    // Check if last 6 alternate between 2 positions
                    if (p[len-1] === p[len-3] && p[len-3] === p[len-5] &&
                        p[len-2] === p[len-4] && p[len-4] === p[len-6] &&
                        p[len-1] !== p[len-2]) {
                        diagStats.ghostOscillation++;
                        if (diagStats.ghostOscillation <= 5) { // only log first few
                            diagAddLog('OSCILLATE: ' + ghost.name + ' between ' + p[len-1] + ' and ' + p[len-2]);
                        }
                    }
                }
            });
        }

        function renderDiagOverlay() {
            if (!diagEnabled) return;
            const pad = 4;
            const lineH = 11;
            const x0 = 2;
            const extraH = (gameState.level >= 4 ? lineH : 0) + ghosts.filter(g => g.state !== 'CAGE').length * lineH;
            const panelH = 130 + extraH;
            const y0 = CANVAS_HEIGHT - panelH - 2;
            // Semi-transparent background
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(x0, y0, 200, panelH);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 1;
            ctx.strokeRect(x0, y0, 200, panelH);

            ctx.font = '9px monospace';
            ctx.textAlign = 'left';
            let ly = y0 + lineH;

            ctx.fillStyle = '#0f0';
            ctx.fillText('DIAG [D] L' + gameState.level + ' f:' + diagStats.framesRun, x0 + pad, ly); ly += lineH;

            const hasIssues = (diagStats.ghostInWall + diagStats.ghostOutOfBounds +
                diagStats.ghostOscillation + diagStats.ghostStuck +
                diagStats.ghostInHouse + diagStats.multiDeath) > 0;
            ctx.fillStyle = hasIssues ? '#f44' : '#0f0';
            ctx.fillText(hasIssues ? 'STATUS: ISSUES FOUND' : 'STATUS: ALL CLEAR', x0 + pad, ly); ly += lineH;

            ctx.fillStyle = diagStats.ghostInWall > 0 ? '#f44' : '#888';
            ctx.fillText('InWall:  ' + diagStats.ghostInWall, x0 + pad, ly); ly += lineH;
            ctx.fillStyle = diagStats.ghostOutOfBounds > 0 ? '#f44' : '#888';
            ctx.fillText('OOB:     ' + diagStats.ghostOutOfBounds, x0 + pad, ly); ly += lineH;
            ctx.fillStyle = diagStats.ghostOscillation > 0 ? '#fa0' : '#888';
            ctx.fillText('Oscill:  ' + diagStats.ghostOscillation, x0 + pad, ly); ly += lineH;
            ctx.fillStyle = diagStats.ghostStuck > 0 ? '#fa0' : '#888';
            ctx.fillText('Stuck:   ' + diagStats.ghostStuck, x0 + pad, ly); ly += lineH;
            ctx.fillStyle = diagStats.ghostInHouse > 0 ? '#f44' : '#888';
            ctx.fillText('InHouse: ' + diagStats.ghostInHouse, x0 + pad, ly); ly += lineH;
            ctx.fillStyle = diagStats.multiDeath > 0 ? '#f44' : '#888';
            ctx.fillText('MultiDth:' + diagStats.multiDeath, x0 + pad, ly); ly += lineH;
            ctx.fillStyle = '#aaa';
            ctx.fillText('Deaths:  ' + diagStats.totalDeaths, x0 + pad, ly); ly += lineH;
            if (gameState.level >= 4) {
                ctx.fillStyle = '#f88';
                ctx.fillText('Cascade: ' + diagStats.alarmCascades +
                    (gameState.alarmActive ? '  ALARM ' + gameState.alarmTimer.toFixed(1) + 's' : ''), x0 + pad, ly);
                ly += lineH;
            }

            // Ghost states
            ly += 2;
            ctx.fillStyle = '#0f0';
            ctx.fillText('-- Ghost States --', x0 + pad, ly); ly += lineH;
            ghosts.forEach(g => {
                if (g.state === 'CAGE') return;
                const modeChar = g.alarmed ? 'A' : (g.frightened ? 'F' : g.mode[0]);
                const pos = Math.round(g.tileX) + ',' + Math.round(g.tileY);
                ctx.fillStyle = g.color;
                ctx.fillText(g.name.substring(0,6) + ' ' + g.state[0] + '/' + modeChar + ' (' + pos + ') ' + g.direction[0], x0 + pad, ly);
                ly += lineH;
            });
        }

            const el = document.getElementById('statusDisplay');
            if (!el) return;

                el.innerHTML = '';
                return;

            ctx.translate(0, -Math.round(camera.y));

            renderHeistVault();
            renderSecurityCameras();
            renderGhosts();
            renderPlayer();
            renderAlarmRings();
            renderLaserPulses();
            renderFloatingTexts();

            renderPhaseTrail(deltaTime);
            renderEMPPulse(deltaTime);
            renderArmorBreak(deltaTime);

                ctx.textAlign = 'center';
