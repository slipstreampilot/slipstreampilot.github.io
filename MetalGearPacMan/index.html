<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fallen Warrior - Pac-Man Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        html, body { height: 100%; touch-action: none; }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            width: 100%;
            height: 100%;
            padding: 5px;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            flex-shrink: 1;
            min-height: 0;
        }
        #controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
            padding: 4px 0;
            flex-shrink: 0;
        }
        #dpad {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0;
        }
        .dpad-button {
            position: absolute;
            width: 52px;
            height: 52px;
            background: rgba(0, 200, 0, 0.3);
            border: 2px solid rgba(0, 255, 0, 0.6);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0f0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad-button:active, .dpad-button.active {
            background: rgba(0, 255, 0, 0.5);
            border-color: #0f0;
        }
        #dpad-up { top: 0; left: 54px; }
        #dpad-down { bottom: 0; left: 54px; }
        #dpad-left { top: 54px; left: 0; }
        #dpad-right { top: 54px; right: 0; }
        #menuBtn {
            background: rgba(255, 50, 50, 0.3);
            border: 2px solid rgba(255, 100, 100, 0.6);
            border-radius: 10px;
            color: #ff6666;
            font-size: 15px;
            font-family: Arial, sans-serif;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        #menuBtn:active {
            background: rgba(255, 50, 50, 0.6);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">

            </div>
            <div id="dpad">

            const controls = document.getElementById('controls');
            const controlsH = controls ? controls.offsetHeight : 180;

            const availH = window.innerHeight - controlsH - 30;

            // Scale to fit while maintaining aspect ratio
            const gameAspect = CANVAS_WIDTH / CANVAS_HEIGHT;
            let cssW = availW;
            let cssH = cssW / gameAspect;

            if (cssH > availH) {
                cssH = availH;
                cssW = cssH * gameAspect;
            }

            canvas.style.width = Math.floor(cssW) + 'px';
            canvas.style.height = Math.floor(cssH) + 'px';

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // Safari suspends AudioContext until resumed inside a user gesture
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function setupMazeState() {
            mazeState = MAZE.map(row => [...row]);
            pelletsInitialCount = 0;
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (mazeState[y][x] === 0 || mazeState[y][x] === 3) {
                        pelletsInitialCount++;
                    }
                }
            }
            gameState.totalPellets = pelletsInitialCount;
            gameState.pelletsEaten = 0;
        }

        function createGhosts() {
            ghosts = ghostData.map(g => ({
                ...g,
                tileX: g.startX,
                tileY: g.startY,
                pixelProgress: 0,
                direction: 'RIGHT',
                speed: 4.05 + (gameState.level - 1) * 0.05,  // 10% slower than player
                state: 'CAGE',
                releaseCounter: 0,
                mode: 'SCATTER',
                modeTimer: 0,
                lastDirection: 'RIGHT',
                frightened: false,
                frightenedTimer: 0,
                eaten: false,
                eatenTimer: 0,
                canReverse: true,
                aware: false,
                pauseTimer: 0,
                targetX: g.scatter.x,
                targetY: g.scatter.y
            }));
        }

        function startGame() {
            lastFrameTime = Date.now();
            gameState.isTitle ? showTitle() : startLevel();
        }

        // ============= TITLE SCREEN =============
        let titleLoopId = null;

        // Draw Metal Slug-style gradient text with thick black outline
        function drawGradientText(text, x, y, fontSize) {
            ctx.save();
            ctx.font = 'bold ' + fontSize + 'px Impact, Arial Black, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Thick black outline
            ctx.lineWidth = fontSize / 5;
            ctx.strokeStyle = '#000';
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;
            ctx.strokeText(text, x, y);

            // Yellow-to-red vertical gradient fill
            const grad = ctx.createLinearGradient(x, y - fontSize * 0.5, x, y + fontSize * 0.5);
            grad.addColorStop(0, '#FFE030');    // bright yellow
            grad.addColorStop(0.3, '#FFA500');  // orange
            grad.addColorStop(0.6, '#FF4500');  // orange-red
            grad.addColorStop(1, '#CC0000');    // dark red
            ctx.fillStyle = grad;
            ctx.fillText(text, x, y);

            // Subtle bright highlight on the top edge
            const highlightGrad = ctx.createLinearGradient(x, y - fontSize * 0.5, x, y - fontSize * 0.15);
            highlightGrad.addColorStop(0, 'rgba(255,255,200,0.6)');
            highlightGrad.addColorStop(1, 'rgba(255,255,200,0)');
            ctx.fillStyle = highlightGrad;
            ctx.fillText(text, x, y);

            ctx.restore();
        }

        function showTitle() {
            if (!gameState.isTitle) return;
            const now = Date.now();

            // Draw the title screen image fitted to canvas (no stretching)
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            if (titleScreenImg.complete && titleScreenImg.naturalWidth > 0) {
                const imgAspect = titleScreenImg.naturalWidth / titleScreenImg.naturalHeight;
                const canvasAspect = CANVAS_WIDTH / CANVAS_HEIGHT;
                let drawW, drawH;
                if (imgAspect < canvasAspect) {
                    // Image is taller — fit to height, center horizontally
                    drawH = CANVAS_HEIGHT;
                    drawW = drawH * imgAspect;
                } else {
                    // Image is wider — fit to width, center vertically
                    drawW = CANVAS_WIDTH;
                    drawH = drawW / imgAspect;
                }
                const drawX = (CANVAS_WIDTH - drawW) / 2;
                const drawY = (CANVAS_HEIGHT - drawH) / 2;
                ctx.drawImage(titleScreenImg, drawX, drawY, drawW, drawH);
            } else {
                // Fallback if image hasn't loaded yet
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                drawGradientText('FALLEN WARRIOR', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2, 36);
            }

            // Overlay: high score (dynamic, always on top)
            if (gameState.highScore > 0) {
                ctx.save();
                ctx.fillStyle = '#FFD700';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.font = 'bold 15px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                ctx.strokeText('HIGH SCORE: ' + gameState.highScore, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 12);
                ctx.fillText('HIGH SCORE: ' + gameState.highScore, CANVAS_WIDTH / 2, CANVAS_HEIGHT - 12);
                ctx.restore();
            }

            titleLoopId = requestAnimationFrame(showTitle);
        }

        function startLevel() {
            setupMazeState();
            createGhosts();
            player.tileX = 14;
            player.tileY = 23;
            player.pixelProgress = 0;
            player.direction = 'NONE';
            player.lastFacing = 'DOWN';
            player.nextDirection = 'NONE';
            player.coasting = false;
            player.stopped = true;
            player.animState = 'idle';
            player.animFrame = 0;
            player.animTimer = 0;
            gameState.readyCounter = 2;
            gameState.powerUpActive = false;
            gameState.powerUpTimer = 0;
            gameState.deathPauseTimer = 0;
            gameState.deathCallback = null;
            gameLoop();
        }

        // ============= GAME LOOP =============
        function gameLoop() {
            const now = Date.now();
            const deltaTime = Math.min((now - lastFrameTime) / 1000, 0.1);
            lastFrameTime = now;

            update(deltaTime);
            render();
            requestAnimationFrame(gameLoop);
        }

        function update(deltaTime) {
            if (gameState.readyCounter > 0) {
                gameState.readyCounter -= deltaTime;
                return;
            }

            // Death animation pause
            if (gameState.deathPauseTimer > 0) {
                gameState.deathPauseTimer -= deltaTime;
                // Still animate the death sprite
                if (player.animState === 'die') {
                    player.animTimer += deltaTime;
                    if (player.animTimer >= player.animSpeed) {
                        player.animTimer -= player.animSpeed;
                        if (player.animFrame < 8) player.animFrame++;
                    }
                }
                if (gameState.deathPauseTimer <= 0 && gameState.deathCallback) {
                    gameState.deathCallback();
                    gameState.deathCallback = null;
                }
                return;
            }

            updatePlayerMovement(deltaTime);
            ghosts.forEach(ghost => updateGhost(ghost, deltaTime));
            checkCollisions();
            updateFloatingTexts(deltaTime);

            // Decay sneak combo timer
            if (gameState.sneakComboTimer > 0) {
                gameState.sneakComboTimer -= deltaTime;
                if (gameState.sneakComboTimer <= 0) {
                    gameState.sneakCombo = 0;
                }
            }

            if (gameState.powerUpActive) {
                gameState.powerUpTimer -= deltaTime;
                if (gameState.powerUpTimer <= 0) {
                    gameState.powerUpActive = false;
                    ghosts.forEach(g => g.frightened = false);
                }
            }

            if (gameState.pelletsEaten >= gameState.totalPellets) {
                levelComplete();
            }
        }

        // How close to the NEXT tile center you must be for corner-cutting to kick in.
        // 0.7 means if you're 70%+ of the way to the next tile and press a perpendicular
        // direction that's valid there, the game snaps you forward and turns immediately.
        const CORNER_CUT_THRESHOLD = 0.7;

        function isPerpendicular(d1, d2) {
            const horiz = { 'LEFT': true, 'RIGHT': true };
            const vert  = { 'UP': true, 'DOWN': true };
            return (horiz[d1] && vert[d2]) || (vert[d1] && horiz[d2]);
        }

        function nextTileInDir(tx, ty, dir) {
            const d = dirToDelta(dir);
            let nx = tx + d.dx, ny = ty + d.dy;
            if (nx < 0) nx = MAZE_WIDTH - 1;
            if (nx >= MAZE_WIDTH) nx = 0;
            return { x: nx, y: ny };
        }

        // Try to execute a turn via corner-cutting. Returns true if turn was made.
        function tryCornerCut(wantDir) {
            if (player.direction === 'NONE' || player.pixelProgress < CORNER_CUT_THRESHOLD) return false;
            if (!isPerpendicular(player.direction, wantDir)) return false;

            // Check if the turn is valid at the NEXT tile (where we'd snap to)
            const next = nextTileInDir(player.tileX, player.tileY, player.direction);
            if (!isWalkable(next.x, next.y, false)) return false;
            if (!canMoveTo(next.x, next.y, wantDir)) return false;

            // Snap forward to next tile center and start the turn
            player.tileX = next.x;
            player.tileY = next.y;
            player.pixelProgress = 0;
            eatPelletAt(player.tileX, player.tileY);
            player.direction = wantDir;
            player.lastFacing = wantDir;
            player.stopped = false;
            player.coasting = false;
            player.nextDirection = 'NONE';
            return true;
        }

        function updatePlayerMovement(deltaTime) {
            // MOVEMENT SYSTEM:
            // - pixelProgress: 0 = at tile center, moves toward 1.0 = next tile center
            // - On release: coast to nearest tile center (forward if past 50%, back if not)
            // - Corner-cutting: if close to next tile and press perpendicular, snap & turn
            // - Persistent buffering: nextDirection persists until fulfilled or replaced

            // Determine the desired direction (held key takes priority, buffered next is fallback)
            const wantDir = heldDirection !== 'NONE' ? heldDirection : player.nextDirection;

            // === COASTING: sliding forward to next tile center after key release ===
            // A quick tap = move exactly one tile. Always coast forward, never backward.
            if (player.coasting) {
                // If player presses a key while coasting, cancel coast immediately
                if (heldDirection !== 'NONE') {
                    player.coasting = false;
                    // Fall through to normal movement below
                } else {
                    // Slide forward to next tile center
                    player.pixelProgress += player.speed * deltaTime;
                    if (player.pixelProgress >= 1.0) {
                        player.pixelProgress = 0;
                        const d = dirToDelta(player.direction);
                        player.tileX += d.dx;
                        player.tileY += d.dy;
                        if (player.tileX < 0) player.tileX = MAZE_WIDTH - 1;
                        if (player.tileX >= MAZE_WIDTH) player.tileX = 0;
                        eatPelletAt(player.tileX, player.tileY);
                        player.stopped = true;
                        player.coasting = false;
                        player.direction = 'NONE';
                    }
                    return;
                }
            }

            // === NO INPUT: start coasting or stay stopped ===
            if (heldDirection === 'NONE' && player.nextDirection === 'NONE') {
                if (player.pixelProgress > 0 && player.direction !== 'NONE') {
                    // Key just released mid-move — always coast forward to next tile
                    const next = nextTileInDir(player.tileX, player.tileY, player.direction);
                    if (isWalkable(next.x, next.y, false)) {
                        player.coasting = true;
                    } else {
                        // Next tile is a wall — stop at current tile center
                        player.pixelProgress = 0;
                        player.stopped = true;
                        player.direction = 'NONE';
                    }
                    return;
                }
                player.stopped = true;
                player.direction = 'NONE';
                return;
            }

            // === CORNER-CUT CHECK: close to next tile + perpendicular input ===
            if (wantDir !== 'NONE' && player.pixelProgress > 0) {
                if (tryCornerCut(wantDir)) {
                    // Successfully snapped to next tile and started turning
                    // Clear nextDirection if it was the one we used
                    if (player.nextDirection === wantDir) player.nextDirection = 'NONE';
                    // Don't return — let movement continue this frame
                }
            }

            // === AT TILE CENTER: choose direction ===
            if (player.pixelProgress === 0) {
                let moveDir = 'NONE';

                // Try held direction first
                if (heldDirection !== 'NONE' && canMoveTo(player.tileX, player.tileY, heldDirection)) {
                    moveDir = heldDirection;
                    if (player.nextDirection === heldDirection) player.nextDirection = 'NONE';
                }
                // Try buffered direction (persistent — don't clear on failure)
                else if (player.nextDirection !== 'NONE' && canMoveTo(player.tileX, player.tileY, player.nextDirection)) {
                    moveDir = player.nextDirection;
                    player.nextDirection = 'NONE'; // fulfilled, now clear
                }
                // Try continuing in current direction
                else if (heldDirection !== 'NONE' && player.direction !== 'NONE' && canMoveTo(player.tileX, player.tileY, player.direction)) {
                    moveDir = player.direction;
                }

                if (moveDir === 'NONE') {
                    player.stopped = true;
                    return;
                }

                player.direction = moveDir;
                player.lastFacing = moveDir;
                player.stopped = false;
            }

            if (player.stopped || player.direction === 'NONE') return;

            // === MID-MOVE: key released, coast forward to next tile ===
            if (heldDirection === 'NONE' && player.nextDirection === 'NONE') {
                const next = nextTileInDir(player.tileX, player.tileY, player.direction);
                if (isWalkable(next.x, next.y, false)) {
                    player.coasting = true;
                } else {
                    // Wall ahead — stop at current tile
                    player.pixelProgress = 0;
                    player.stopped = true;
                    player.direction = 'NONE';
                }
                return;
            }

            // === ACTIVE MOVEMENT ===
            player.pixelProgress += player.speed * deltaTime;

            if (player.pixelProgress >= 1.0) {
                player.pixelProgress = 0;

                const d = dirToDelta(player.direction);
                player.tileX += d.dx;
                player.tileY += d.dy;

                if (player.tileX < 0) player.tileX = MAZE_WIDTH - 1;
                if (player.tileX >= MAZE_WIDTH) player.tileX = 0;

                eatPelletAt(player.tileX, player.tileY);

                // At new tile center — decide next move
                if (heldDirection !== 'NONE') {
                    if (canMoveTo(player.tileX, player.tileY, heldDirection)) {
                        player.direction = heldDirection;
                        player.lastFacing = heldDirection;
                        if (player.nextDirection === heldDirection) player.nextDirection = 'NONE';
                    } else if (player.nextDirection !== 'NONE' && canMoveTo(player.tileX, player.tileY, player.nextDirection)) {
                        player.direction = player.nextDirection;
                        player.lastFacing = player.nextDirection;
                        player.nextDirection = 'NONE';
                    } else if (canMoveTo(player.tileX, player.tileY, player.direction)) {
                        // Keep going same direction
                    } else {
                        player.stopped = true;
                    }
                } else if (player.nextDirection !== 'NONE') {
                    // No key held but buffered direction exists
                    if (canMoveTo(player.tileX, player.tileY, player.nextDirection)) {
                        player.direction = player.nextDirection;
                        player.lastFacing = player.nextDirection;
                        player.nextDirection = 'NONE';
                    } else if (canMoveTo(player.tileX, player.tileY, player.direction)) {
                        // Keep going, buffer persists for next intersection
                    } else {
                        player.stopped = true;
                        player.direction = 'NONE';
                    }
                } else {
                    player.stopped = true;
                    player.direction = 'NONE';
                }
            }

            // Animate sprite based on state
            if (player.animState === 'attack' || player.animState === 'die') {
                // Attack/die animations play through once
                player.animTimer += deltaTime;
                if (player.animTimer >= player.animSpeed) {
                    player.animTimer -= player.animSpeed;
                    player.animFrame++;
                    const maxFrames = player.animState === 'attack' ? 5 : 9;
                    if (player.animFrame >= maxFrames) {
                        if (player.animState === 'attack') {
                            // Return to idle/run after attack
                            player.animState = player.stopped ? 'idle' : 'run';
                            player.animFrame = 0;
                        } else {
                            // Die animation holds on last frame
                            player.animFrame = maxFrames - 1;
                        }
                    }
                }
            } else if (!player.stopped) {
                player.animState = 'run';
                player.frameCounter += deltaTime;
                if (player.frameCounter >= 0.1) {
                    player.frameCounter = 0;
                    player.animFrame = (player.animFrame + 1) % 8;
                }
            } else if (player.animState !== 'die') {
                player.animState = 'idle';
                player.frameCounter += deltaTime;
                if (player.frameCounter >= 0.2) {
                    player.frameCounter = 0;
                    player.animFrame = (player.animFrame + 1) % 4;
                }
            }
        }

        function dirToDelta(dir) {
            switch(dir) {
                case 'UP': return {dx: 0, dy: -1};
                case 'DOWN': return {dx: 0, dy: 1};
                case 'LEFT': return {dx: -1, dy: 0};
                case 'RIGHT': return {dx: 1, dy: 0};
                default: return {dx: 0, dy: 0};
            }
        }

        function eatPelletAt(tx, ty) {
            if (ty < 0 || ty >= MAZE_HEIGHT || tx < 0 || tx >= MAZE_WIDTH) return;
            if (mazeState[ty][tx] === 0) {
                gameState.score += 10;
                gameState.pelletsEaten++;
                playWaka();
                mazeState[ty][tx] = 2;
            } else if (mazeState[ty][tx] === 3) {
                gameState.score += 50;
                gameState.pelletsEaten++;
                playPowerUp();
                gameState.powerUpActive = true;
                gameState.powerUpTimer = 8;
                ghosts.forEach(g => {
                    if (g.state !== 'EATEN') {
                        g.frightened = true;
                        g.canReverse = true;
                    }
                });
                mazeState[ty][tx] = 2;
            }
        }

        function updateGhost(ghost, deltaTime) {
            if (ghost.state === 'CAGE') {
                ghost.releaseCounter += deltaTime;
                if (ghost.releaseCounter >= ghost.releaseTime) {
                    ghost.state = 'EXITING';
                }
                return;
            }

            if (ghost.state === 'EXITING') {
                if (ghost.tileY > 10) {
                    ghost.tileY -= 4 * deltaTime;
                } else {
                    ghost.state = 'SCATTER';
                    ghost.tileY = 10;
                }
                return;
            }

            if (ghost.state === 'EATEN') {
                const cageX = 13, cageY = 12;
                const dist = Math.hypot(ghost.tileX - cageX, ghost.tileY - cageY);
                if (dist < 0.5) {
                    ghost.state = 'CAGE';
                    ghost.releaseCounter = ghost.releaseTime > 0 ? ghost.releaseTime - 15 : -15; // wait 15 seconds
                    ghost.tileX = ghost.startX;
                    ghost.tileY = ghost.startY;
                    ghost.frightened = false;
                    return;
                }
                const angle = Math.atan2(cageY - ghost.tileY, cageX - ghost.tileX);
                ghost.tileX += Math.cos(angle) * 10 * deltaTime;
                ghost.tileY += Math.sin(angle) * 10 * deltaTime;
                return;
            }

            ghost.modeTimer += deltaTime;
            // Scatter-heavy cycle: long patrol windows for stealth opportunities
            // [scatter, chase, scatter, chase, scatter, chase, scatter(permanent)]
            const modeSequence = [12, 8, 12, 8, 15, 8, 999];
            let modeIndex = 0;
            let elapsed = 0;
            for (let i = 0; i < modeSequence.length; i++) {
                elapsed += modeSequence[i];
                if (ghost.modeTimer < elapsed) {
                    modeIndex = i;
                    break;
                }
            }
            const baseMode = modeIndex % 2 === 0 ? 'SCATTER' : 'CHASE';

            // Awareness cone: in scatter mode, ghost only chases if player is
            // within 5 tiles AND in front of the ghost's facing direction
            ghost.aware = false;
            if (baseMode === 'SCATTER' && !ghost.frightened) {
                const gdelta = dirToDelta(ghost.direction);
                const dxP = player.tileX - ghost.tileX;
                const dyP = player.tileY - ghost.tileY;
                const dist = Math.hypot(dxP, dyP);
                // Dot product: positive = player is in front of ghost
                const dot = gdelta.dx * dxP + gdelta.dy * dyP;
                if (dist < 5 && dot > 0) {
                    ghost.aware = true;
                }
            }
            ghost.mode = (baseMode === 'SCATTER' && ghost.aware) ? 'CHASE' : baseMode;

            // Scatter ghosts move slower — easier to catch from behind
            let speed = ghost.frightened ? (ghost.speed * 0.6) : ghost.speed;
            if (ghost.mode === 'SCATTER') speed *= 0.85;

            // Tile-to-tile ghost movement using pixelProgress
            if (!ghost.pixelProgress) ghost.pixelProgress = 0;

            // Intersection hesitation: in scatter mode, pause briefly at intersections
            if (ghost.pauseTimer > 0) {
                ghost.pauseTimer -= deltaTime;
                return;
            }

            if (ghost.pixelProgress === 0) {
                // At tile center — check for intersection pause in scatter
                const tileX = ghost.tileX;
                const tileY = ghost.tileY;

                if (ghost.mode === 'SCATTER' && !ghost.frightened) {
                    const exits = ['UP','DOWN','LEFT','RIGHT'].filter(d =>
                        isWalkable(moveInDir(tileX, tileY, d).x, moveInDir(tileX, tileY, d).y, true)
                    ).length;
                    // 3+ exits = intersection; pause 0.3-0.5s
                    if (exits >= 3 && Math.random() < 0.4) {
                        ghost.pauseTimer = 0.3 + Math.random() * 0.2;
                    }
                }

                if (ghost.frightened) {
                    const directions = ['UP', 'DOWN', 'LEFT', 'RIGHT'].filter(d => {
                        const newTile = moveInDir(tileX, tileY, d);
                        return isWalkable(newTile.x, newTile.y, true) && d !== oppositeDir(ghost.lastDirection);
                    });
                    if (directions.length > 0) {
                        ghost.direction = directions[Math.floor(Math.random() * directions.length)];
                    }
                } else {
                    let target = { x: tileX, y: tileY };
                    if (ghost.mode === 'SCATTER') {
                        target = ghost.scatter;
                    } else {
                        if (ghost.name === 'Blinky') {
                            target = { x: player.tileX, y: player.tileY };
                        } else if (ghost.name === 'Pinky') {
                            const pd = dirToDelta(player.direction);
                            target = { x: player.tileX + pd.dx * 4, y: player.tileY + pd.dy * 4 };
                        } else if (ghost.name === 'Inky') {
                            const blinky = ghosts[0];
                            const pd = dirToDelta(player.direction);
                            const px = player.tileX + pd.dx * 2;
                            const py = player.tileY + pd.dy * 2;
                            target = { x: px + (px - blinky.tileX), y: py + (py - blinky.tileY) };
                        } else if (ghost.name === 'Clyde') {
                            const dist = Math.hypot(tileX - player.tileX, tileY - player.tileY);
                            target = dist > 8 ? { x: player.tileX, y: player.tileY } : ghost.scatter;
                        }
                    }

                    const directions = ['UP', 'DOWN', 'LEFT', 'RIGHT'].filter(d => {
                        const newTile = moveInDir(tileX, tileY, d);
                        return isWalkable(newTile.x, newTile.y, true) && (ghost.canReverse || d !== oppositeDir(ghost.lastDirection));
                    });

                    let best = ghost.direction;
                    let bestDist = Infinity;
                    directions.forEach(d => {
                        const newTile = moveInDir(tileX, tileY, d);
                        const dist = Math.hypot(newTile.x - target.x, newTile.y - target.y);
                        if (dist < bestDist) {
                            bestDist = dist;
                            best = d;
                        }
                    });
                    ghost.direction = best;
                    ghost.lastDirection = best;
                    ghost.canReverse = false;
                }
            }

            // Move toward next tile
            ghost.pixelProgress += speed * deltaTime;

            if (ghost.pixelProgress >= 1.0) {
                ghost.pixelProgress = 0;
                const d = dirToDelta(ghost.direction);
                ghost.tileX += d.dx;
                ghost.tileY += d.dy;
                // Tunnel wrapping
                if (ghost.tileX < 0) ghost.tileX = MAZE_WIDTH - 1;
                if (ghost.tileX >= MAZE_WIDTH) ghost.tileX = 0;
            }
        }

        function moveInDir(x, y, dir) {
            const moves = { 'UP': { x, y: y - 1 }, 'DOWN': { x, y: y + 1 }, 'LEFT': { x: x - 1, y }, 'RIGHT': { x: x + 1, y } };
            return moves[dir];
        }

        function oppositeDir(dir) {
            const opp = { 'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT' };
            return opp[dir];
        }

        function checkCollisions() {
            const delta = dirToDelta(player.direction);
            const progress = player.stopped ? 0 : player.pixelProgress;
            const px = player.tileX + delta.dx * progress;
            const py = player.tileY + delta.dy * progress;
            ghosts.forEach((ghost, idx) => {
                if (ghost.state === 'CAGE' || ghost.state === 'EXITING' || ghost.state === 'EATEN') return;
                const dist = Math.hypot(px - ghost.tileX, py - ghost.tileY);
                if (dist < 0.7) {
                    if (ghost.frightened || gameState.powerUpActive) {
                        gameState.score += [200, 400, 800, 1600][Math.min(idx, 3)];
                        playGhostEaten();
                        ghost.state = 'EATEN';
                        ghost.frightened = false;
                    } else if (isGhostFacingPlayer(ghost)) {
                        // Ghost's front is toward the player — ghost wins
                        // (covers head-on AND ghost catching player from behind/side)
                        playerDeath();
                    } else {
                        // Ghost is NOT facing the player:
                        // - Player's front → ghost's back/side = stealth kill
                        // - Neither facing (side-swipe) = stealth kill (ghost unaware)
                        performStealthKill(ghost);
                    }
                }
            });
        }

        function performStealthKill(ghost) {
            gameState.sneakCombo++;
            gameState.sneakComboTimer = 10;
            const comboMult = Math.min(gameState.sneakCombo, 5);
            const sneakScore = 800 * comboMult;
            gameState.score += sneakScore;
            gameState.lastSneakScore = sneakScore;
            // Trigger knife attack animation
            player.animState = 'attack';
            player.animFrame = 0;
            player.animTimer = 0;
            // Face the ghost for the kill
            const gd2 = dirToDelta(ghost.direction);
            const gp2 = ghost.pixelProgress || 0;
            const gx = ghost.tileX + gd2.dx * gp2;
            const gy = ghost.tileY + gd2.dy * gp2;
            const dxToGhost = gx - player.tileX;
            const dyToGhost = gy - player.tileY;
            if (Math.abs(dxToGhost) > Math.abs(dyToGhost)) {
                player.lastFacing = dxToGhost > 0 ? 'RIGHT' : 'LEFT';
            } else {
                player.lastFacing = dyToGhost > 0 ? 'DOWN' : 'UP';
            }
            // Floating score text
            const gd = dirToDelta(ghost.direction);
            const gp = ghost.pixelProgress || 0;
            showFloatingText(
                (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2,
                (ghost.tileY + gd.dy * gp) * TILE_SIZE,
                '+' + sneakScore + (comboMult > 1 ? ' x' + comboMult + ' COMBO!' : ' STEALTH!')
            );
            playSneakAttack();
            screenFlash();
            ghost.state = 'EATEN';
            ghost.frightened = false;
        }

        // Returns positions for collision facing checks
        function getCollisionPositions(ghost) {
            const gd = dirToDelta(ghost.direction);
            const gp = ghost.pixelProgress || 0;
            const gx = ghost.tileX + gd.dx * gp;
            const gy = ghost.tileY + gd.dy * gp;
            const pDir = player.direction !== 'NONE' ? player.direction : player.lastFacing;
            const pd = dirToDelta(pDir);
            const pp = player.stopped ? 0 : player.pixelProgress;
            const px = player.tileX + pd.dx * pp;
            const py = player.tileY + pd.dy * pp;
            return { gx, gy, gd, px, py, pd };
        }

        function isGhostFacingPlayer(ghost) {
            // Is the player in the ghost's forward half? (ghost can "see" player)
            const { gx, gy, gd, px, py } = getCollisionPositions(ghost);
            const dx = px - gx;
            const dy = py - gy;
            return (gd.dx * dx + gd.dy * dy) > 0;
        }

        function isPlayerFacingGhost(ghost) {
            // Is the ghost in the player's forward half? (player approaching ghost)
            const { gx, gy, px, py, pd } = getCollisionPositions(ghost);
            const dx = gx - px;
            const dy = gy - py;
            return (pd.dx * dx + pd.dy * dy) > 0;
        }

        function canMoveTo(x, y, dir) {
            const newPos = moveInDir(x, y, dir);
            return isWalkable(Math.round(newPos.x), Math.round(newPos.y));
        }

        function isWalkable(x, y, isGhost = false) {
            if (x < 0 || x >= MAZE_WIDTH || y < 0 || y >= MAZE_HEIGHT) return true;
            const cell = MAZE[y][x];
            if (isGhost) return cell !== 1; // ghosts can enter house
            return cell !== 1 && cell !== 4 && cell !== 5; // player blocked from house
        }

        // Floating score text system
        let floatingTexts = [];
        function showFloatingText(x, y, text) {
            floatingTexts.push({ x, y, text, timer: 2.0, startY: y });
        }
        function updateFloatingTexts(deltaTime) {
            floatingTexts.forEach(ft => {
                ft.timer -= deltaTime;
                ft.y = ft.startY - (2.0 - ft.timer) * 30; // float upward
            });
            floatingTexts = floatingTexts.filter(ft => ft.timer > 0);
        }
        function renderFloatingTexts() {
            floatingTexts.forEach(ft => {
                const alpha = Math.min(1, ft.timer);
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#FFD700';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.font = 'bold 14px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                ctx.strokeText(ft.text, ft.x, ft.y);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.restore();
            });
        }

        function screenFlash() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        function playerDeath() {
            gameState.lives--;
            playDeath();
            // Trigger die animation
            player.animState = 'die';
            player.animFrame = 0;
            player.animTimer = 0;
            player.stopped = true;
            player.direction = 'NONE';
            // Pause for death animation (~0.9s for 9 frames at 0.1s each), then reset
            gameState.deathPauseTimer = 1.0;
            if (gameState.lives <= 0) {
                gameState.deathCallback = function() { gameOver(); };
            } else {
                gameState.deathCallback = function() {
                    player.tileX = 14;
                    player.tileY = 23;
                    player.pixelProgress = 0;
                    player.direction = 'NONE';
                    player.lastFacing = 'DOWN';
                    player.nextDirection = 'NONE';
                    player.coasting = false;
                    player.stopped = true;
                    player.animState = 'idle';
                    player.animFrame = 0;
                    gameState.readyCounter = 2;
                    ghosts.forEach(g => {
                        if (g.state !== 'CAGE') {
                            g.state = 'CAGE';
                            g.releaseCounter = 0;
                            g.tileX = g.startX;
                            g.tileY = g.startY;
                        }
                    });
                };
            }
        }

        function levelComplete() {
            gameState.level++;
            gameState.score += 1000;
            playLevelComplete();
            gameState.readyCounter = 3;
            startLevel();
        }

        function gameOver() {
            gameState.gameOver = true;
            playDeath();
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('pacmanHighScore', gameState.highScore);
            }
            setTimeout(() => {
                gameState.gameOver = false;
                gameState.isTitle = true;
                gameState.score = 0;
                gameState.lives = 3;
                gameState.level = 1;
                startGame();
            }, 3000);
        }

        // ============= RENDERING =============
        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            renderMaze();
            renderGhosts();
            renderPlayer();
            renderFloatingTexts();
            renderHUD();

            if (gameState.readyCounter > 0) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('READY!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            }

            if (gameState.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = '#F00';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            }
        }

        function renderMaze() {
            ctx.fillStyle = '#2121FF';
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (MAZE[y][x] === 1) {
                        ctx.fillRect(x * TILE_SIZE + 1, y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                    } else if (MAZE[y][x] === 5) {
                        ctx.fillStyle = '#FF1493';
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE, 2);
                        ctx.fillStyle = '#2121FF';
                    }
                }
            }

            ctx.fillStyle = '#FFA500';
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (mazeState[y][x] === 0) {
                        ctx.beginPath();
                        ctx.arc(x * TILE_SIZE + TILE_SIZE / 2, y * TILE_SIZE + TILE_SIZE / 2, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (mazeState[y][x] === 3) {
                        // Power pellets - big and flashing
                        const flash = Math.floor(Date.now() / 200) % 2 === 0;
                        if (flash) {
                            ctx.fillStyle = '#FFD700';
                            ctx.beginPath();
                            ctx.arc(x * TILE_SIZE + TILE_SIZE / 2, y * TILE_SIZE + TILE_SIZE / 2, 6, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = '#FFA500';
                        }
                    }
                }
            }
        }

        function renderGhosts() {
            ghosts.forEach((ghost, idx) => {
                // Smooth interpolation for ghost position
                const gd = dirToDelta(ghost.direction);
                const gp = ghost.pixelProgress || 0;
                const x = (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2;
                const y = (ghost.tileY + gd.dy * gp) * TILE_SIZE + TILE_SIZE / 2;

                // Awareness cone: shows where the ghost is looking and detection range
                if (ghost.state !== 'EATEN' && ghost.state !== 'CAGE' &&
                    ghost.state !== 'EXITING' && !ghost.frightened) {
                    ctx.save();
                    const visionRange = 5 * TILE_SIZE; // 5 tiles of vision
                    const coneHalfWidth = TILE_SIZE * 1.2; // wide spread at far end

                    // Build a trapezoid cone in the ghost's facing direction
                    const dir = ghost.direction || 'RIGHT';
                    let x1, y1, x2, y2, x3, y3, x4, y4;
                    const nearW = TILE_SIZE * 0.45; // near the ghost

                    if (dir === 'RIGHT') {
                        x1 = x; y1 = y - nearW;
                        x2 = x; y2 = y + nearW;
                        x3 = x + visionRange; y3 = y + coneHalfWidth;
                        x4 = x + visionRange; y4 = y - coneHalfWidth;
                    } else if (dir === 'LEFT') {
                        x1 = x; y1 = y - nearW;
                        x2 = x; y2 = y + nearW;
                        x3 = x - visionRange; y3 = y + coneHalfWidth;
                        x4 = x - visionRange; y4 = y - coneHalfWidth;
                    } else if (dir === 'DOWN') {
                        x1 = x - nearW; y1 = y;
                        x2 = x + nearW; y2 = y;
                        x3 = x + coneHalfWidth; y3 = y + visionRange;
                        x4 = x - coneHalfWidth; y4 = y + visionRange;
                    } else { // UP
                        x1 = x - nearW; y1 = y;
                        x2 = x + nearW; y2 = y;
                        x3 = x + coneHalfWidth; y3 = y - visionRange;
                        x4 = x - coneHalfWidth; y4 = y - visionRange;
                    }

                    // Gradient: strong near ghost, fades at max range
                    const gradDelta = dirToDelta(dir);
                    const gradX1 = x + gradDelta.dx * visionRange;
                    const gradY1 = y + gradDelta.dy * visionRange;
                    const coneGrad = ctx.createLinearGradient(x, y, gradX1, gradY1);

                    if (ghost.aware) {
                        // ALERT — bright red, pulses
                        const pulse = 0.45 + Math.sin(Date.now() / 100) * 0.1;
                        coneGrad.addColorStop(0, 'rgba(255, 30, 30, ' + pulse + ')');
                        coneGrad.addColorStop(0.7, 'rgba(255, 30, 30, 0.15)');
                        coneGrad.addColorStop(1, 'rgba(255, 30, 30, 0)');
                    } else {
                        // Patrol — visible amber/yellow
                        coneGrad.addColorStop(0, 'rgba(255, 220, 50, 0.35)');
                        coneGrad.addColorStop(0.6, 'rgba(255, 180, 30, 0.12)');
                        coneGrad.addColorStop(1, 'rgba(255, 150, 0, 0)');
                    }

                    // Filled cone
                    ctx.fillStyle = coneGrad;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x4, y4);
                    ctx.lineTo(x3, y3);
                    ctx.lineTo(x2, y2);
                    ctx.closePath();
                    ctx.fill();

                    // Edge outline for extra clarity
                    ctx.strokeStyle = ghost.aware ? 'rgba(255, 60, 60, 0.5)' : 'rgba(255, 200, 50, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.restore();
                }

                if (ghost.state === 'EATEN') {
                    renderGhostEyes(x, y, ghost.direction);
                } else if (ghost.frightened) {
                    renderFrightenedGhost(x, y);
                } else {
                    renderGhost(x, y, ghost.color, ghost.direction);
                }
            });
        }

        function renderGhost(x, y, color, direction) {
            const size = TILE_SIZE * 0.85;
            const hh = size / 2;

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y - hh / 2, hh, Math.PI, 0);
            ctx.lineTo(x + hh, y + hh / 2);
            ctx.lineTo(x - hh, y + hh / 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = color;
            ctx.fillRect(x - hh, y - hh / 2, size, hh);

            ctx.fillStyle = color;
            for (let i = 0; i < 3; i++) {
                const px = x - hh + (i + 0.5) * (size / 3);
                const py = y + hh / 2;
                ctx.beginPath();
                ctx.arc(px, py, 3, 0, Math.PI);
                ctx.fill();
            }

            const eyeSize = size * 0.25;
            const eyeY = y - hh / 3;
            const eyeX1 = x - eyeSize;
            const eyeX2 = x + eyeSize;

            ctx.fillStyle = '#FFF';
            ctx.fillRect(eyeX1 - eyeSize, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);
            ctx.fillRect(eyeX2 - eyeSize / 2, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);

            const pupilOffset = { 'UP': { x: 0, y: -3 }, 'DOWN': { x: 0, y: 3 }, 'LEFT': { x: -3, y: 0 }, 'RIGHT': { x: 3, y: 0 } };
            const poff = pupilOffset[direction] || { x: 0, y: 0 };

            ctx.fillStyle = '#001080';
            ctx.fillRect(eyeX1 - eyeSize / 3 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
            ctx.fillRect(eyeX2 + eyeSize / 6 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
        }

        function renderFrightenedGhost(x, y) {
            const size = TILE_SIZE * 0.85;
            const hh = size / 2;

            ctx.fillStyle = '#2121DE';
            ctx.beginPath();
            ctx.arc(x, y - hh / 2, hh, Math.PI, 0);
            ctx.lineTo(x + hh, y + hh / 2);
            ctx.lineTo(x - hh, y + hh / 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#2121DE';
            ctx.fillRect(x - hh, y - hh / 2, size, hh);

            ctx.fillStyle = '#2121DE';
            for (let i = 0; i < 3; i++) {
                const px = x - hh + (i + 0.5) * (size / 3);
                const py = y + hh / 2;
                ctx.beginPath();
                ctx.arc(px, py, 3, 0, Math.PI);
                ctx.fill();
            }

            ctx.fillStyle = '#FFF';
            ctx.fillRect(x - 5, y - 3, 3, 3);
            ctx.fillRect(x + 2, y - 3, 3, 3);

            ctx.strokeStyle = '#FFB8FF';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x - 4, y + 4, 2, 0, Math.PI * 2);
            ctx.stroke();
        }

        function renderGhostEyes(x, y, direction) {
            const eyeSize = TILE_SIZE * 0.2;
            const eyeY = y;
            const eyeX1 = x - eyeSize * 2;
            const eyeX2 = x + eyeSize * 2;

            ctx.fillStyle = '#FFF';
            ctx.fillRect(eyeX1 - eyeSize, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);
            ctx.fillRect(eyeX2 - eyeSize / 2, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);

            const pupilOffset = { 'UP': { x: 0, y: -2 }, 'DOWN': { x: 0, y: 2 }, 'LEFT': { x: -2, y: 0 }, 'RIGHT': { x: 2, y: 0 } };
            const poff = pupilOffset[direction] || { x: 0, y: 0 };

            ctx.fillStyle = '#001080';
            ctx.fillRect(eyeX1 - eyeSize / 3 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
            ctx.fillRect(eyeX2 + eyeSize / 6 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
        }

        function renderPlayer() {
            // Smooth position: interpolate between current tile and next tile
            const delta = dirToDelta(player.direction);
            const progress = player.stopped ? 0 : player.pixelProgress;
            const cx = (player.tileX + delta.dx * progress) * TILE_SIZE + TILE_SIZE / 2;
            const cy = (player.tileY + delta.dy * progress) * TILE_SIZE + TILE_SIZE / 2;

            // Pick the right sprite sheet and frame
            const renderDir = player.direction !== 'NONE' ? player.direction : player.lastFacing;
            let sheet, frameCount, frame;
            switch (player.animState) {
                case 'attack':
                    sheet = spriteAttack; frameCount = 5;
                    frame = player.animFrame;
                    break;
                case 'die':
                    sheet = spriteDie; frameCount = 9;
                    frame = player.animFrame;
                    break;
                case 'run':
                    sheet = spriteRun; frameCount = 8;
                    frame = player.animFrame % frameCount;
                    break;
                default: // idle
                    sheet = spriteIdle; frameCount = 4;
                    frame = player.animFrame % frameCount;
                    break;
            }

            const FRAME_W = 60, FRAME_H = 60;
            const sx = frame * FRAME_W;
            const sy = 0; // all sheets are single-row horizontal strips
            const drawSize = TILE_SIZE * 4; // 80px — large and clearly visible

            // Determine if we need to flip horizontally (sprites face RIGHT by default)
            const flipX = (renderDir === 'LEFT');

            if (sheet.complete && sheet.naturalWidth > 0) {
                ctx.save();
                ctx.translate(cx, cy);
                if (flipX) ctx.scale(-1, 1);
                // Offset upward so feet sit at tile center, no overlap with walls below
                ctx.drawImage(sheet, sx, sy, FRAME_W, FRAME_H,
                    -drawSize / 2, -drawSize * 0.75, drawSize, drawSize);
                ctx.restore();
            } else {
                // Minimal fallback — small dot, no green circle
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function renderHUD() {
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Score: ' + gameState.score, 5, 15);
            ctx.textAlign = 'center';
            ctx.fillText('High: ' + gameState.highScore, CANVAS_WIDTH / 2, 15);
            ctx.textAlign = 'right';
            ctx.fillText('Level: ' + gameState.level, CANVAS_WIDTH - 5, 15);

            ctx.textAlign = 'left';
            for (let i = 0; i < gameState.lives; i++) {
                if (spriteIdle.complete && spriteIdle.naturalWidth > 0) {
                    ctx.drawImage(spriteIdle, 0, 0, 60, 60, 5 + i * 18, CANVAS_HEIGHT - 18, 16, 16);
                } else {
                    ctx.fillStyle = '#0F0';
                    ctx.fillRect(10 + i * 20, CANVAS_HEIGHT - 15, 10, 10);
                }
            }

            // Stealth combo indicator
            if (gameState.sneakCombo > 0 && gameState.sneakComboTimer > 0) {
                ctx.textAlign = 'right';
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 13px Impact, Arial Black, sans-serif';
                const comboText = 'STEALTH x' + gameState.sneakCombo;
                ctx.fillText(comboText, CANVAS_WIDTH - 5, CANVAS_HEIGHT - 8);
            }
        }

        // ============= SOUND SYSTEM =============
        function playWaka() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 400 + Math.random() * 200;
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        }

        function playPowerUp() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }

        function playGhostEaten() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }

        function playSneakAttack() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.4);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }

        function playDeath() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.6);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        }

        function playLevelComplete() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = [262, 294, 330, 392];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, now + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.1);
                osc.start(now + i * 0.1);
                osc.stop(now + i * 0.1 + 0.1);
            });
        }

        // ============= INPUT HANDLING =============
        // Track which direction keys/buttons are currently held
        let heldDirection = 'NONE';  // Currently held direction input

        function returnToTitle() {
            gameState.isTitle = true;
            gameState.gameOver = false;
            gameState.score = 0;
            gameState.lives = 3;
            gameState.level = 1;
            gameState.deathPauseTimer = 0;
            gameState.deathCallback = null;
            heldDirection = 'NONE';
            player.animState = 'idle';
            player.animFrame = 0;
            showTitle();
        }

        function startFromTitle() {
            if (gameState.isTitle) {
                gameState.isTitle = false;
                if (titleLoopId) cancelAnimationFrame(titleLoopId);
                startLevel();
            }
        }

        const KEY_MAP = {
            'ArrowUp': 'UP', 'ArrowDown': 'DOWN', 'ArrowLeft': 'LEFT', 'ArrowRight': 'RIGHT',
            'w': 'UP', 'W': 'UP', 'a': 'LEFT', 'A': 'LEFT', 's': 'DOWN', 'S': 'DOWN', 'd': 'RIGHT', 'D': 'RIGHT'
        };

        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') startFromTitle();
                if (e.key === 'Escape') returnToTitle();
                if (e.key === 'm' || e.key === 'M') {
                    gameState.soundEnabled = !gameState.soundEnabled;
                    localStorage.setItem('pacmanSound', gameState.soundEnabled ? 'true' : 'false');
                }
                if (KEY_MAP[e.key]) {
                    heldDirection = KEY_MAP[e.key];
                    player.nextDirection = heldDirection;
                    e.preventDefault();
                }
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
            });
            document.addEventListener('keyup', (e) => {
                if (KEY_MAP[e.key] && KEY_MAP[e.key] === heldDirection) {
                    heldDirection = 'NONE';
                }
            });
        }

        function setupDPad() {
            const dpadButtons = {
                'dpad-up': 'UP',
                'dpad-down': 'DOWN',
                'dpad-left': 'LEFT',
                'dpad-right': 'RIGHT'
            };

            // Prevent double-fire on mobile (touchstart + synthetic click)
            let lastTouchTime = 0;
            function touchGuard(fn) {
                return function(e) {
                    if (e.type === 'touchstart') {
                        lastTouchTime = Date.now();
                        e.preventDefault();
                        fn();
                    } else if (e.type === 'click') {
                        // Ignore click if a touch just happened (within 500ms)
                        if (Date.now() - lastTouchTime < 500) return;
                        fn();
                    }
                };
            }

            // Canvas tap to start game from title
            const canvasStart = touchGuard(startFromTitle);
            canvas.addEventListener('click', canvasStart);
            canvas.addEventListener('touchstart', canvasStart, { passive: false });

            // Menu button
            const menuAction = touchGuard(returnToTitle);
            document.getElementById('menuBtn').addEventListener('click', menuAction);
            document.getElementById('menuBtn').addEventListener('touchstart', menuAction, { passive: false });

            // Sound toggle button
            const soundBtn = document.getElementById('soundBtn');
            function doToggleSound() {
                gameState.soundEnabled = !gameState.soundEnabled;
                soundBtn.textContent = gameState.soundEnabled ? '🔊 ON' : '🔇 OFF';
            }
            const soundAction = touchGuard(doToggleSound);
            soundBtn.addEventListener('click', soundAction);
            soundBtn.addEventListener('touchstart', soundAction, { passive: false });

            // D-pad buttons — held while pressed, release stops movement
            Object.entries(dpadButtons).forEach(([id, dir]) => {
                const btn = document.getElementById(id);

                function pressDir(e) {
                    if (e) e.preventDefault();
                    heldDirection = dir;
                    player.nextDirection = dir;
                    btn.classList.add('active');
                    // Also start game from title on any d-pad press
                    startFromTitle();
                }
                function releaseDir(e) {
                    if (e) e.preventDefault();
                    if (heldDirection === dir) heldDirection = 'NONE';
                    btn.classList.remove('active');
                }

                btn.addEventListener('touchstart', pressDir, { passive: false });
                btn.addEventListener('touchend', releaseDir, { passive: false });
                btn.addEventListener('touchcancel', releaseDir, { passive: false });
                btn.addEventListener('mousedown', pressDir);
                btn.addEventListener('mouseup', releaseDir);
                btn.addEventListener('mouseleave', releaseDir);
            });

            // Global touchend/touchcancel fallback: if finger slides off a D-pad
            // button, Safari may not fire touchend on the original element.
            // Only clear if no touches remain on any D-pad button.
            function globalTouchCleanup(e) {
                // Check if any remaining touch is on a dpad button
                const remaining = e.touches || [];
                let onDpad = false;
                for (let i = 0; i < remaining.length; i++) {
                    const el = document.elementFromPoint(remaining[i].clientX, remaining[i].clientY);
                    if (el && el.classList && el.classList.contains('dpad-button')) {
                        onDpad = true;
                        break;
                    }
                }
                if (!onDpad) {
                    document.querySelectorAll('.dpad-button.active').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    heldDirection = 'NONE';
                }
            }
            document.addEventListener('touchend', globalTouchCleanup, { passive: true });
            document.addEventListener('touchcancel', globalTouchCleanup, { passive: true });
        }

        // Start the game
        window.addEventListener('load', init);
    </script>
</body>
</html>
