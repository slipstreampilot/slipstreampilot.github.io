<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decision Tree Research</title>
<!-- Jost = open-source Futura clone. macOS/iOS use real Futura first; everywhere else falls back to Jost. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #072420; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Futura-Medium', 'Futura', 'Futura PT', 'Jost', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .stage {
    width: min(95vw, 900px);
    aspect-ratio: 800 / 450;
  }
  svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- ═══════════════════════════════════════════════════════════
           Geometry (matches decision-tree-research-logo.svg exactly):
             stroke=5, r=15, vertical=37.5, crossbar=175
             Children at x = 312.5, 400, 487.5;  cy = 190
             Root  cx = 400, cy = 80.   Crossbar y = 135.
             Trunk y1=97.5, y2=135.   Drops y2=172.5.
           Text positioning (Option B — matches static SVG exactly):
             DT  transform="translate(108.37 308)"     font-size 74, letter-spacing .04em
             RS  transform="translate(212.95 369.75) scale(1.06 1)"   font-size 50, letter-spacing .28em
           ═══════════════════════════════════════════════════════════ -->

      <!-- Cross / drop cream lines (NOT trunk — trunk drawn LAST) -->
      <line id="crossL" x1="400" y1="135" x2="312.5" y2="135"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#ddcaab" stroke-width="5" stroke-linecap="square"/>
      <line id="crossR" x1="400" y1="135" x2="487.5" y2="135"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#ddcaab" stroke-width="5" stroke-linecap="square"/>
      <line id="dropL"  x1="312.5" y1="135" x2="312.5" y2="172.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#ddcaab" stroke-width="5" stroke-linecap="square"/>
      <line id="dropM"  x1="400" y1="135" x2="400" y2="172.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#ddcaab" stroke-width="5" stroke-linecap="square"/>
      <line id="dropR"  x1="487.5" y1="135" x2="487.5" y2="172.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#ddcaab" stroke-width="5" stroke-linecap="square"/>

      <!-- Node strokes -->
      <circle id="root"  cx="400"   cy="80"  r="0" fill="none" stroke="#ddcaab" stroke-width="5"/>
      <circle id="nodeL" cx="312.5" cy="190" r="0" fill="none" stroke="#ddcaab" stroke-width="5"/>
      <circle id="nodeM" cx="400"   cy="190" r="0" fill="none" stroke="#ddcaab" stroke-width="5"/>
      <circle id="nodeR" cx="487.5" cy="190" r="0" fill="none" stroke="#ddcaab" stroke-width="5"/>

      <!-- Right child inner fill: green disc that grows from center -->
      <circle id="rightFill" cx="487.5" cy="190" r="0" fill="#67c070"/>

      <!-- Green overlay lines (drawn progressively as the wave passes) -->
      <line id="crossRGreen" x1="400" y1="135" x2="487.5" y2="135"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#67c070" stroke-width="5" stroke-linecap="square"/>
      <line id="dropRGreen"  x1="487.5" y1="135" x2="487.5" y2="172.5"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#67c070" stroke-width="5" stroke-linecap="square"/>

      <!-- Trunk drawn LAST so its cream covers the green at the central joint -->
      <line id="trunk" x1="400" y1="97.5" x2="400" y2="135"
            pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100"
            stroke="#ddcaab" stroke-width="5" stroke-linecap="square"/>

      <!-- Signal dot (subtle wave of light) -->
      <circle id="signal" cx="400" cy="80" r="0" fill="#a8f0bd" opacity="0" filter="url(#softGlow)"/>

      <!-- Brand text — matches the static SVG exactly (translate + scale + tspan). -->
      <text id="title" transform="translate(108.37 308)"
            font-family="Futura-Medium, Futura, 'Jost', sans-serif"
            font-size="74" font-weight="500" letter-spacing=".04em"
            fill="#ddcaab" opacity="0"><tspan x="0" y="0">DECISION TREE</tspan></text>
      <text id="subtitle" transform="translate(212.95 369.75) scale(1.06 1)"
            font-family="Futura-Medium, Futura, 'Jost', sans-serif"
            font-size="50" font-weight="500" letter-spacing=".28em"
            fill="#67c070" opacity="0"><tspan x="0" y="0">RESEARCH</tspan></text>
    </svg>
  </div>
</div>

<script>
(() => {
  // One-shot logo intro: plays from frame 0 to FRAMES, then stops at the final state.
  const FRAMES = 180;
  const DURATION = 6000;

  const NEUTRAL = [221, 202, 171];  // #ddcaab
  const GREEN = [103, 192, 112];    // #67c070
  const NODE_R = 15;

  // Optional: ?frame=N to render a specific frame statically (used by test runner)
  const urlParams = new URLSearchParams(window.location.search);
  const STATIC_FRAME = urlParams.has('frame') ? parseFloat(urlParams.get('frame')) : null;

  // Geometry (matches decision-tree-research-logo.svg exactly)
  const ROOT_CX = 400, ROOT_CY = 80;
  const CROSSBAR_Y = 135;
  const CHILD_CY = 190;
  const RIGHT_X = 487.5;

  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const lerp = (a, b, t) => a + (b - a) * t;
  const easeOutQuart = (t) => 1 - Math.pow(1 - t, 4);
  const snap = (frame, a, b) => {
    if (frame <= a) return 0;
    if (frame >= b) return 1;
    return easeOutQuart((frame - a) / (b - a));
  };
  const linstep = (frame, a, b) => clamp((frame - a) / (b - a), 0, 1);
  const lerpColor = (c1, c2, t) => {
    const r = Math.round(lerp(c1[0], c2[0], t));
    const g = Math.round(lerp(c1[1], c2[1], t));
    const b = Math.round(lerp(c1[2], c2[2], t));
    return `rgb(${r},${g},${b})`;
  };

  const $ = id => document.getElementById(id);
  const trunk = $('trunk'),  crossL = $('crossL'), crossR = $('crossR');
  const dropL = $('dropL'),  dropM = $('dropM'),   dropR = $('dropR');
  const root = $('root'),    nodeL = $('nodeL'),   nodeM = $('nodeM'),  nodeR = $('nodeR');
  const crossRGreen = $('crossRGreen'), dropRGreen = $('dropRGreen');
  const rightFill = $('rightFill');
  const signal = $('signal');
  const title = $('title'),  subtitle = $('subtitle');

  // Wave path: root center → crossbar joint → cross-R end → right child center
  const SEG1 = CROSSBAR_Y - ROOT_CY;     // 55
  const SEG2 = RIGHT_X - ROOT_CX;        // 87.5
  const SEG3 = CHILD_CY - CROSSBAR_Y;    // 55
  const TOTAL_PATH = SEG1 + SEG2 + SEG3; // 197.5

  function pointOnDecisionPath(p) {
    const d = p * TOTAL_PATH;
    if (d <= SEG1) return [ROOT_CX, ROOT_CY + d];
    if (d <= SEG1 + SEG2) return [ROOT_CX + (d - SEG1), CROSSBAR_Y];
    return [RIGHT_X, CROSSBAR_Y + (d - SEG1 - SEG2)];
  }

  function update(frame) {
    // 0–56  BUILD  · 56–88  HOLD  · 88–130  WAVE  · 130–150  DISC  · 150–180  TEXT  · 180+ HOLD

    const rootBuild  = snap(frame, 0,  8);
    const trunkBuild = snap(frame, 8,  20);
    const crossBuild = snap(frame, 22, 32);
    const dropBuild  = snap(frame, 34, 44);
    const childBuild = snap(frame, 46, 56);

    const wave = linstep(frame, 88, 130);
    const wavePathDist = wave * TOTAL_PATH;

    // Trunk and root stay CREAM. Wave's signal dot travels through them
    // visually but does NOT paint them green.
    const crossRPaintP = clamp((wavePathDist - SEG1) / SEG2, 0, 1);
    const dropRPaintP  = clamp((wavePathDist - SEG1 - SEG2) / SEG3, 0, 1);
    const rightStrokeT = clamp((wavePathDist - (TOTAL_PATH - 22)) / 22, 0, 1);

    const innerFillT = snap(frame, 130, 150);
    const textOp     = snap(frame, 150, 180);

    root.setAttribute('r',  String(NODE_R * rootBuild));
    nodeL.setAttribute('r', String(NODE_R * childBuild));
    nodeM.setAttribute('r', String(NODE_R * childBuild));
    nodeR.setAttribute('r', String(NODE_R * childBuild));
    rightFill.setAttribute('r', String(NODE_R * innerFillT));

    trunk.setAttribute('stroke-dashoffset',  String((1 - trunkBuild) * 100));
    crossL.setAttribute('stroke-dashoffset', String((1 - crossBuild) * 100));
    crossR.setAttribute('stroke-dashoffset', String((1 - crossBuild) * 100));
    dropL.setAttribute('stroke-dashoffset',  String((1 - dropBuild)  * 100));
    dropM.setAttribute('stroke-dashoffset',  String((1 - dropBuild)  * 100));
    dropR.setAttribute('stroke-dashoffset',  String((1 - dropBuild)  * 100));

    crossRGreen.setAttribute('stroke-dashoffset', String((1 - crossRPaintP) * 100));
    dropRGreen.setAttribute('stroke-dashoffset',  String((1 - dropRPaintP)  * 100));

    nodeR.setAttribute('stroke', lerpColor(NEUTRAL, GREEN, rightStrokeT));

    if (wave > 0 && wave < 1) {
      const [sx, sy] = pointOnDecisionPath(wave);
      signal.setAttribute('cx', String(sx));
      signal.setAttribute('cy', String(sy));
      signal.setAttribute('r', '4');
      signal.setAttribute('opacity', String(Math.sin(wave * Math.PI) * 0.85));
    } else {
      signal.setAttribute('opacity', '0');
    }

    title.setAttribute('opacity', String(textOp));
    subtitle.setAttribute('opacity', String(textOp));
  }

  if (STATIC_FRAME !== null) {
    update(STATIC_FRAME);
  } else {
    let startTime = null;
    function tick(now) {
      if (startTime === null) startTime = now;
      const elapsed = now - startTime;
      const frame = Math.min((elapsed / DURATION) * FRAMES, FRAMES);
      update(frame);
      if (frame < FRAMES) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
})();
</script>
</body>
</html>
