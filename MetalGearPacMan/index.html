                ctx.beginPath(); ctx.moveTo(goCx - 120, 108); ctx.lineTo(goCx + 120, 108); ctx.stroke();
                // Stats
                var goY = 130;
                ctx.font = 'bold 16px Impact, Arial Black, sans-serif';
                ctx.fillStyle = '#FFD700';
                ctx.fillText('FINAL STATS', goCx, goY); goY += 28;
                // Stats rows
                var stats = [
                    { label: 'Level Reached', value: '' + gameState.level, color: '#0AF' },
                    { label: 'Ghosts Killed', value: '' + gameState.ghostsKilled, color: '#F66' },
                    { label: 'Money Earned', value: '$' + gameState.moneyEarned, color: '#8F8' },
                    { label: 'Money Remaining', value: '$' + gameState.money, color: '#FFD700' }
                ];
                ctx.font = '14px Arial';
                for (var si = 0; si < stats.length; si++) {
                    // Stat row panel
                    var srW = 280, srH = 28;
                    var srX = goCx - srW / 2;
                    ctx.fillStyle = 'rgba(18, 28, 48, 0.6)';
                    ctx.beginPath();
                    ctx.roundRect(srX, goY - 4, srW, srH, 6);
                    ctx.fill();
                    ctx.fillStyle = '#AAB';
                    ctx.textAlign = 'left';
                    ctx.fillText(stats[si].label, srX + 12, goY + 14);
                    ctx.fillStyle = stats[si].color;
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText(stats[si].value, srX + srW - 12, goY + 14);
                    ctx.font = '14px Arial';
                    goY += 36;
                }
                goY += 10;
                // Prompt
                var goPulse = 0.5 + Math.sin(Date.now() / 300) * 0.3;
                ctx.fillStyle = 'rgba(255, 255, 255, ' + goPulse.toFixed(2) + ')';
                ctx.font = 'bold 16px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('TAP OR PRESS ENTER TO CONTINUE', goCx, goY);
            }

            // Upgrade shop overlay
            if (gameState.showShop) {
                drawShop();
            }

            // Upgrades inventory overlay
            if (gameState.showUpgradesOverlay) {
                drawUpgradesOverlay();
            }

            renderDiagOverlay();
            updateStatusDisplay();
        }

        function renderMaze() {
            // Viewport culling: only render rows visible in viewport
            var vpMinRow = Math.max(0, Math.floor(camera.y / TILE_SIZE) - 1);
            var vpMaxRow = Math.min(MAZE_HEIGHT - 1, Math.ceil((camera.y + VIEWPORT_HEIGHT) / TILE_SIZE) + 1);
            ctx.fillStyle = '#2121FF';
            for (let y = vpMinRow; y <= vpMaxRow; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (MAZE[y][x] === 1) {
                        ctx.fillRect(x * TILE_SIZE + 1, y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                    } else if (MAZE[y][x] === 5) {
                        ctx.fillStyle = '#FF1493';
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE, 2);
                        ctx.fillStyle = '#2121FF';
                    } else if (MAZE[y][x] === 6 && gameState.level >= 8) {
                        // Exit tile — pulsing green border
                        var exitGlow = 0.3 + Math.sin(Date.now() / 300) * 0.2;
                        ctx.fillStyle = 'rgba(0, 255, 100, ' + exitGlow.toFixed(2) + ')';
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#2121FF';
                    }
                }
            }

            ctx.fillStyle = '#FFA500';
            for (let y = vpMinRow; y <= vpMaxRow; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (mazeState[y][x] === 0) {
                        ctx.beginPath();
                        ctx.arc(x * TILE_SIZE + TILE_SIZE / 2, y * TILE_SIZE + TILE_SIZE / 2, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (mazeState[y][x] === 3) {
                        if (gameState.level >= 6) {
                            // Assault rifle pickup - small pixel rifle icon
                            const rx = x * TILE_SIZE + TILE_SIZE / 2;
                            const ry = y * TILE_SIZE + TILE_SIZE / 2;
                            ctx.save();
                            // Pulsing yellow glow behind the rifle
                            const glow = 0.3 + Math.sin(Date.now() / 200) * 0.3;
                            ctx.fillStyle = 'rgba(255, 215, 0, ' + glow.toFixed(2) + ')';
                            ctx.beginPath();
                            ctx.arc(rx, ry, 8, 0, Math.PI * 2);
                            ctx.fill();
                            // Rifle body (dark gray)
                            ctx.fillStyle = '#888';
                            ctx.fillRect(rx - 7, ry - 1, 14, 3);
                            // Stock (brown)
                            ctx.fillStyle = '#8B4513';
                            ctx.fillRect(rx - 7, ry - 1, 4, 3);
                            // Barrel tip (light gray)
                            ctx.fillStyle = '#CCC';
                            ctx.fillRect(rx + 5, ry - 1, 3, 2);
                            // Trigger guard
                            ctx.fillStyle = '#666';
                            ctx.fillRect(rx - 1, ry + 2, 3, 2);
                            // Scope dot (red)
                            ctx.fillStyle = '#F00';
                            ctx.fillRect(rx + 1, ry - 3, 2, 2);
                            ctx.restore();
                        } else {
                            // Power pellets - big and flashing
                            const flash = Math.floor(Date.now() / 200) % 2 === 0;
                            if (flash) {
                                ctx.fillStyle = '#FFD700';
                                ctx.beginPath();
                                ctx.arc(x * TILE_SIZE + TILE_SIZE / 2, y * TILE_SIZE + TILE_SIZE / 2, 6, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.fillStyle = '#FFA500';
                            }
                        }
                    }
                }
            }

            // Render safes (Safe Cracker upgrade)
            upgradeEffects.safes.forEach(s => {
                if (s.cracked) return;
                const sx = s.tileX * TILE_SIZE;
                const sy = s.tileY * TILE_SIZE;
                // Safe body - dark metal
                ctx.fillStyle = '#555';
                ctx.fillRect(sx + 3, sy + 3, TILE_SIZE - 6, TILE_SIZE - 6);
                // Inner frame
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 1;
                ctx.strokeRect(sx + 4, sy + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                // Dollar sign
                ctx.fillStyle = '#0F0';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', sx + TILE_SIZE / 2, sy + TILE_SIZE / 2);
                ctx.textBaseline = 'alphabetic';
                // Pulsing glow
                const safeGlow = 0.2 + Math.sin(Date.now() / 400) * 0.15;
                ctx.fillStyle = 'rgba(0, 255, 0, ' + safeGlow.toFixed(2) + ')';
                ctx.fillRect(sx + 2, sy + 2, TILE_SIZE - 4, TILE_SIZE - 4);
            });

            // Render data nodes (Data Tap upgrade)
            upgradeEffects.dataNodes.forEach(dn => {
                if (dn.collected) return;
                const dx = dn.tileX * TILE_SIZE + TILE_SIZE / 2;
                const dy = dn.tileY * TILE_SIZE + TILE_SIZE / 2;
                // Spinning diamond shape
                const rot = Date.now() / 500;
                ctx.save();
                ctx.translate(dx, dy);
                ctx.rotate(rot);
                ctx.fillStyle = '#0FF';
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(0, -5);
                ctx.lineTo(5, 0);
                ctx.lineTo(0, 5);
                ctx.lineTo(-5, 0);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            });
        }

        function renderAlarmRings() {
            if (gameState.alarmRings.length === 0) return;
            ctx.save();
            gameState.alarmRings.forEach(ring => {
                if (ring.opacity <= 0) return;
                ctx.beginPath();
                ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 40, 40, ' + (ring.opacity * 0.8).toFixed(2) + ')';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            ctx.restore();
        }

        function renderGhosts() {
            ghosts.forEach((ghost, idx) => {
                // Smooth interpolation for ghost position
                const gd = dirToDelta(ghost.direction);
                const gp = ghost.pixelProgress || 0;
                const x = (ghost.tileX + gd.dx * gp) * TILE_SIZE + TILE_SIZE / 2;
                const y = (ghost.tileY + gd.dy * gp) * TILE_SIZE + TILE_SIZE / 2;

                // Awareness cone: shows where the ghost is looking, blocked by walls
                if (ghost.state !== 'EATEN' && ghost.state !== 'CAGE' &&
                    ghost.state !== 'EXITING' && !ghost.frightened) {
                    ctx.save();
                    const dir = ghost.direction || 'RIGHT';

                    // Smooth pixel-accurate distance to first wall (shrinks as ghost walks toward it)
                    const visionRange = getVisionDistPx(x, y, dir);
                    if (visionRange > 2) {
                        // Narrow widths: cone fits within a 1-tile corridor
                        const nearW = TILE_SIZE * 0.25;
                        const fullFarW = TILE_SIZE * 0.45;
                        // Scale far-end width proportionally to actual range vs max range
                        const ratio = visionRange / (5 * TILE_SIZE);
                        const coneHalfWidth = nearW + (fullFarW - nearW) * ratio;

                        // Build a trapezoid cone in the ghost's facing direction
                        let x1, y1, x2, y2, x3, y3, x4, y4;

                        if (dir === 'RIGHT') {
                            x1 = x; y1 = y - nearW;
                            x2 = x; y2 = y + nearW;
                            x3 = x + visionRange; y3 = y + coneHalfWidth;
                            x4 = x + visionRange; y4 = y - coneHalfWidth;
                        } else if (dir === 'LEFT') {
                            x1 = x; y1 = y - nearW;
                            x2 = x; y2 = y + nearW;
                            x3 = x - visionRange; y3 = y + coneHalfWidth;
                            x4 = x - visionRange; y4 = y - coneHalfWidth;
                        } else if (dir === 'DOWN') {
                            x1 = x - nearW; y1 = y;
                            x2 = x + nearW; y2 = y;
                            x3 = x + coneHalfWidth; y3 = y + visionRange;
                            x4 = x - coneHalfWidth; y4 = y + visionRange;
                        } else { // UP
                            x1 = x - nearW; y1 = y;
                            x2 = x + nearW; y2 = y;
                            x3 = x + coneHalfWidth; y3 = y - visionRange;
                            x4 = x - coneHalfWidth; y4 = y - visionRange;
                        }

                        // Gradient: strong near ghost, fades at max range
                        const gradDelta = dirToDelta(dir);
                        const gradX1 = x + gradDelta.dx * visionRange;
                        const gradY1 = y + gradDelta.dy * visionRange;
                        const coneGrad = ctx.createLinearGradient(x, y, gradX1, gradY1);

                        if (ghost.alarmed) {
                            coneGrad.addColorStop(0, 'rgba(255, 30, 30, 0.45)');
                            coneGrad.addColorStop(0.7, 'rgba(255, 30, 30, 0.15)');
                            coneGrad.addColorStop(1, 'rgba(255, 30, 30, 0)');
                        } else {
                            coneGrad.addColorStop(0, 'rgba(255, 255, 50, 0.35)');
                            coneGrad.addColorStop(0.6, 'rgba(255, 255, 30, 0.12)');
                            coneGrad.addColorStop(1, 'rgba(255, 255, 0, 0)');
                        }

                        // Clip to non-wall tiles so cone edges can't bleed into walls
                        const dd = dirToDelta(dir);
                        const gTX = Math.round(ghost.tileX);
                        const gTY = Math.round(ghost.tileY);
                        const maxTilesForClip = Math.ceil(visionRange / TILE_SIZE) + 1;
                        ctx.beginPath();
                        for (let i = 0; i <= maxTilesForClip; i++) {
                            for (let j = -1; j <= 1; j++) {
                                const tx = gTX + dd.dx * i + (-dd.dy) * j;
                                const ty = gTY + dd.dy * i + dd.dx * j;
                                if (tx >= 0 && tx < MAZE_WIDTH && ty >= 0 && ty < MAZE_HEIGHT && MAZE[ty][tx] !== 1) {
                                    ctx.rect(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                                }
                            }
                        }
                        ctx.clip();

                        // Filled cone
                        ctx.fillStyle = coneGrad;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x4, y4);
                        ctx.lineTo(x3, y3);
                        ctx.lineTo(x2, y2);
                        ctx.closePath();
                        ctx.fill();

                        // Bright 2px border
                        ctx.strokeStyle = ghost.alarmed ? 'rgba(255, 40, 40, 0.7)' : 'rgba(255, 255, 50, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                    ctx.restore();
                }

                if (ghost.state === 'EATEN') {
                    renderGhostEyes(x, y, ghost.direction);
                } else if (upgradeEffects.empTimer > 0 && ghost.state !== 'CAGE') {
                    // EMP frozen effect: blue-white flickering ghost
                    ctx.save();
                    const flicker = Math.floor(Date.now() / 80) % 2 === 0;
                    ctx.globalAlpha = flicker ? 0.5 : 0.8;
                    renderGhost(x, y, '#6CF', ghost.direction);
                    // Static electricity sparks
                    ctx.globalAlpha = 1;
                    ctx.strokeStyle = '#AEF';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) {
                        const sparkAngle = Date.now() / 100 + i * 2.1;
                        const sr = 8 + Math.sin(sparkAngle * 3) * 3;
                        const sparkX = x + Math.cos(sparkAngle) * sr;
                        const sparkY = y + Math.sin(sparkAngle) * sr;
                        ctx.beginPath();
                        ctx.moveTo(sparkX - 2, sparkY);
                        ctx.lineTo(sparkX + 1, sparkY - 3);
                        ctx.lineTo(sparkX + 2, sparkY + 1);
                        ctx.stroke();
                    }
                    ctx.restore();
                } else if (ghost.frightened) {
                    // Flash between blue and original color in the last 2 seconds
                    if (gameState.powerUpTimer <= 2 && Math.floor(gameState.powerUpTimer * 5) % 2 === 0) {
                        renderGhost(x, y, ghost.color, ghost.direction);
                    } else {
                        renderFrightenedGhost(x, y);
                    }
                } else {
                    renderGhost(x, y, ghost.color, ghost.direction);
                }
            });
        }

        function renderGhost(x, y, color, direction) {
            const size = TILE_SIZE * 0.85;
            const hh = size / 2;

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y - hh / 2, hh, Math.PI, 0);
            ctx.lineTo(x + hh, y + hh / 2);
            ctx.lineTo(x - hh, y + hh / 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = color;
            ctx.fillRect(x - hh, y - hh / 2, size, hh);

            ctx.fillStyle = color;
            for (let i = 0; i < 3; i++) {
                const px = x - hh + (i + 0.5) * (size / 3);
                const py = y + hh / 2;
                ctx.beginPath();
                ctx.arc(px, py, 3, 0, Math.PI);
                ctx.fill();
            }

            const eyeSize = size * 0.25;
            const eyeY = y - hh / 3;
            const eyeX1 = x - eyeSize;
            const eyeX2 = x + eyeSize;

            ctx.fillStyle = '#FFF';
            ctx.fillRect(eyeX1 - eyeSize, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);
            ctx.fillRect(eyeX2 - eyeSize / 2, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);

            const pupilOffset = { 'UP': { x: 0, y: -3 }, 'DOWN': { x: 0, y: 3 }, 'LEFT': { x: -3, y: 0 }, 'RIGHT': { x: 3, y: 0 } };
            const poff = pupilOffset[direction] || { x: 0, y: 0 };

            ctx.fillStyle = '#001080';
            ctx.fillRect(eyeX1 - eyeSize / 3 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
            ctx.fillRect(eyeX2 + eyeSize / 6 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
        }

        function renderFrightenedGhost(x, y) {
            const size = TILE_SIZE * 0.85;
            const hh = size / 2;

            ctx.fillStyle = '#2121DE';
            ctx.beginPath();
            ctx.arc(x, y - hh / 2, hh, Math.PI, 0);
            ctx.lineTo(x + hh, y + hh / 2);
            ctx.lineTo(x - hh, y + hh / 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#2121DE';
            ctx.fillRect(x - hh, y - hh / 2, size, hh);

            ctx.fillStyle = '#2121DE';
            for (let i = 0; i < 3; i++) {
                const px = x - hh + (i + 0.5) * (size / 3);
                const py = y + hh / 2;
                ctx.beginPath();
                ctx.arc(px, py, 3, 0, Math.PI);
                ctx.fill();
            }

            ctx.fillStyle = '#FFF';
            ctx.fillRect(x - 5, y - 3, 3, 3);
            ctx.fillRect(x + 2, y - 3, 3, 3);

            ctx.strokeStyle = '#FFB8FF';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x - 4, y + 4, 2, 0, Math.PI * 2);
            ctx.stroke();
        }

        function renderGhostEyes(x, y, direction) {
            const eyeSize = TILE_SIZE * 0.2;
            const eyeY = y;
            const eyeX1 = x - eyeSize * 2;
            const eyeX2 = x + eyeSize * 2;

            ctx.fillStyle = '#FFF';
            ctx.fillRect(eyeX1 - eyeSize, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);
            ctx.fillRect(eyeX2 - eyeSize / 2, eyeY - eyeSize, eyeSize * 1.5, eyeSize * 1.5);

            const pupilOffset = { 'UP': { x: 0, y: -2 }, 'DOWN': { x: 0, y: 2 }, 'LEFT': { x: -2, y: 0 }, 'RIGHT': { x: 2, y: 0 } };
            const poff = pupilOffset[direction] || { x: 0, y: 0 };

            ctx.fillStyle = '#001080';
            ctx.fillRect(eyeX1 - eyeSize / 3 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
            ctx.fillRect(eyeX2 + eyeSize / 6 + poff.x, eyeY - eyeSize / 2 + poff.y, eyeSize / 2, eyeSize / 2);
        }

        function renderPlayer() {
            // Smooth position: interpolate between current tile and next tile
            const delta = dirToDelta(player.direction);
            const progress = player.stopped ? 0 : player.pixelProgress;
            const cx = (player.tileX + delta.dx * progress) * TILE_SIZE + TILE_SIZE / 2;
            const cy = (player.tileY + delta.dy * progress) * TILE_SIZE + TILE_SIZE / 2;

            // Pick the right sprite sheet and frame
            const renderDir = player.direction !== 'NONE' ? player.direction : player.lastFacing;
            let sheet, frameCount, frame;
            const useRifle = player.armed && player.ammo > 0;
            switch (player.animState) {
                case 'attack':
                    if (useRifle) {
                        sheet = rifleShoot; frameCount = 6;
                    } else {
                        sheet = spriteAttack; frameCount = 5;
                    }
                    frame = player.animFrame;
                    break;
                case 'die':
                    if (useRifle) {
                        sheet = rifleDie; frameCount = 9;
                    } else {
                        sheet = spriteDie; frameCount = 9;
                    }
                    frame = player.animFrame;
                    break;
                case 'run':
                    if (useRifle) {
                        sheet = rifleRun; frameCount = 8;
                    } else {
                        sheet = spriteRun; frameCount = 8;
                    }
                    frame = player.animFrame % frameCount;
                    break;
                default: // idle
                    if (useRifle) {
                        sheet = rifleIdle; frameCount = 4;
                    } else {
                        sheet = spriteIdle; frameCount = 4;
                    }
                    frame = player.animFrame % frameCount;
                    break;
            }

            const FRAME_W = 60, FRAME_H = 60;
            const sx = frame * FRAME_W;
            const sy = 0; // all sheets are single-row horizontal strips
            const drawSize = TILE_SIZE * 4; // 80px — large and clearly visible

            // Determine if we need to flip horizontally (sprites face RIGHT by default)
            const flipX = (renderDir === 'LEFT');

            if (sheet.complete && sheet.naturalWidth > 0) {
                ctx.save();
                // Cloak effect: make player translucent + shimmer
                if (upgradeEffects.cloakTimer > 0) {
                    const shimmer = 0.15 + Math.sin(Date.now() / 100) * 0.1;
                    ctx.globalAlpha = shimmer;
                }
                ctx.translate(cx + 5, cy);
                if (flipX) ctx.scale(-1, 1);
                const dstX = -drawSize / 2, dstY = -drawSize * 0.75;

                // === Outline glow: draw sprite silhouette offset in 8 directions ===
                ctx.globalAlpha = upgradeEffects.cloakTimer > 0 ? (0.15 + Math.sin(Date.now() / 100) * 0.1) : 0.9;
                const outlineColor = '#FFD700';
                const off = 2; // outline thickness in pixels
                // Use offscreen canvas to create colored silhouette
                if (!renderPlayer._oc) {
                    renderPlayer._oc = document.createElement('canvas');
                    renderPlayer._octx = renderPlayer._oc.getContext('2d');
                }
                const oc = renderPlayer._oc;
                const octx = renderPlayer._octx;
                const pad = off * 2;
                const ocW = drawSize + pad * 2;
                const ocH = drawSize + pad * 2;
                if (oc.width !== ocW || oc.height !== ocH) {
                    oc.width = ocW;
                    oc.height = ocH;
                }
                octx.clearRect(0, 0, ocW, ocH);
                // Draw sprite shifted in 8 directions
                const dirs8 = [[-off,0],[off,0],[0,-off],[0,off],[-off,-off],[off,-off],[-off,off],[off,off]];
                for (const [ox, oy] of dirs8) {
                    octx.drawImage(sheet, sx, sy, FRAME_W, FRAME_H,
                        pad + ox, pad + oy, drawSize, drawSize);
                }
                // Tint entire thing to outline color
                octx.globalCompositeOperation = 'source-in';
                octx.fillStyle = outlineColor;
                octx.fillRect(0, 0, ocW, ocH);
                octx.globalCompositeOperation = 'source-over';
                // Cut out the original sprite shape so outline is only the edge
                octx.globalCompositeOperation = 'destination-out';
                octx.drawImage(sheet, sx, sy, FRAME_W, FRAME_H,
                    pad, pad, drawSize, drawSize);
                octx.globalCompositeOperation = 'source-over';
                // Draw the outline onto main canvas
                ctx.drawImage(oc, dstX - pad, dstY - pad);
                ctx.globalAlpha = 1.0;

                // Draw sprite normally on top
                ctx.drawImage(sheet, sx, sy, FRAME_W, FRAME_H,
                    dstX, dstY, drawSize, drawSize);
                // Brighten: overdraw with 'lighter' blend to boost visibility
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = 0.35;
                ctx.drawImage(sheet, sx, sy, FRAME_W, FRAME_H,
                    dstX, dstY, drawSize, drawSize);
                ctx.restore();
            } else {
                // Minimal fallback — small dot, no green circle
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Store HUD activation slot bounds for tap detection
        renderHUD._activeSlots = [];

        // ============= MINIMAP =============
        function renderMinimap() {
            // Small overview of the full maze in the top-right corner
            var mmScale = 2; // each tile = 2px on minimap
            var mmW = MAZE_WIDTH * mmScale;  // 56px
            var mmH = MAZE_HEIGHT * mmScale; // 62px
            var mmX = CANVAS_WIDTH - mmW - 6;
            var mmY = 22; // below HUD level display
            var mmPad = 2;

            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.beginPath();
            ctx.roundRect(mmX - mmPad, mmY - mmPad, mmW + mmPad * 2, mmH + mmPad * 2, 3);
            ctx.fill();
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw maze tiles
            for (var y = 0; y < MAZE_HEIGHT; y++) {
                for (var x = 0; x < MAZE_WIDTH; x++) {
                    var cell = MAZE[y][x];
                    if (cell === 1) {
                        ctx.fillStyle = '#113';
                        ctx.fillRect(mmX + x * mmScale, mmY + y * mmScale, mmScale, mmScale);
                    } else if (cell === 4 || cell === 5) {
                        ctx.fillStyle = '#220033';
                        ctx.fillRect(mmX + x * mmScale, mmY + y * mmScale, mmScale, mmScale);
                    }
                    // Pellets still remaining
                    if (mazeState[y] && (mazeState[y][x] === 0 || mazeState[y][x] === 3)) {
                        ctx.fillStyle = mazeState[y][x] === 3 ? '#FFA500' : '#334';
                        ctx.fillRect(mmX + x * mmScale, mmY + y * mmScale, mmScale, mmScale);
                    }
                }
            }

            // Draw ghosts as small colored dots
            ghosts.forEach(function(g) {
                ctx.fillStyle = g.color || '#F00';
                ctx.fillRect(mmX + g.tileX * mmScale, mmY + g.tileY * mmScale, mmScale, mmScale);
            });

            // Draw player as bright yellow dot
            ctx.fillStyle = '#FF0';
            ctx.fillRect(mmX + player.tileX * mmScale, mmY + player.tileY * mmScale, mmScale + 1, mmScale + 1);

            // Draw viewport indicator (rectangle showing what's currently visible)
            var vpTopRow = camera.y / TILE_SIZE;
            var vpBotRow = (camera.y + VIEWPORT_HEIGHT) / TILE_SIZE;
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(mmX, mmY + vpTopRow * mmScale, mmW, (vpBotRow - vpTopRow) * mmScale);
        }

        function renderHUD() {
            renderHUD._activeSlots = [];

            // === HUD Strip background (below viewport) ===
            var hudY0 = VIEWPORT_HEIGHT; // top of HUD strip
            ctx.fillStyle = '#0a0e17';
            ctx.fillRect(0, hudY0, CANVAS_WIDTH, HUD_HEIGHT);
            // Subtle top border
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, hudY0); ctx.lineTo(CANVAS_WIDTH, hudY0); ctx.stroke();

            // === Top-of-viewport overlay: Money + Level (stays on game area) ===
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.beginPath();
            ctx.roundRect(2, 2, 82, 18, 4);
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 14px Impact, Arial Black, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('$' + gameState.money, 6, 16);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            var lvlText = 'LV.' + gameState.level;
            var lvlW = ctx.measureText(lvlText).width + 12;
            ctx.beginPath();
            ctx.roundRect(CANVAS_WIDTH - lvlW - 4, 2, lvlW + 2, 18, 4);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.textAlign = 'right';
            ctx.fillText(lvlText, CANVAS_WIDTH - 6, 16);
            ctx.restore();

            // === Gather upgrade info ===
            const activeUpgrades = [];
            const passiveUpgrades = [];
            const activeKeyMap = { phase: 'Q', cloak: 'E', emp: 'R', armor: 'AUTO' };
            const activeColorMap = { phase: '#6CF', cloak: '#A8F', emp: '#4DF', armor: '#F90' };

            for (let i = 0; i < UPGRADE_DEFS.length; i++) {
                const def = UPGRADE_DEFS[i];
                const count = getUpgradeCount(def.id);
                if (count === 0) continue;
                if (def.type === 'active') {
                    const charges = activeCharges[def.id] || 0;
                    activeUpgrades.push({ defIdx: i, id: def.id, charges: charges, key: activeKeyMap[def.id] || '', color: activeColorMap[def.id] || '#FFF', name: def.name });
                } else {
                    passiveUpgrades.push({ defIdx: i, id: def.id, count: count });
                }
            }

            // === HUD Strip layout: Lives | Passive icons | Active slots | Ammo/Combo ===
            var hudMidY = hudY0 + HUD_HEIGHT / 2; // vertical center of HUD strip

            // Lives display (left side of HUD strip)
            ctx.textAlign = 'left';
            for (let i = 0; i < gameState.lives; i++) {
                if (spriteIdle.complete && spriteIdle.naturalWidth > 0) {
                    ctx.drawImage(spriteIdle, 0, 0, 60, 60, 5 + i * 18, hudY0 + 4, 14, 14);
                } else {
                    ctx.fillStyle = '#0F0';
                    ctx.fillRect(10 + i * 20, hudY0 + 6, 10, 10);
                }
            }

            // Passive upgrade icons (left-center, after lives)
            if (passiveUpgrades.length > 0) {
                const pIconSize = 16;
                const pGap = 2;
                let px = 5 + Math.max(gameState.lives, 1) * 18 + 6;
                const py = hudY0 + 3;
                for (let i = 0; i < passiveUpgrades.length; i++) {
                    const pu = passiveUpgrades[i];
                    if (shopIconsImg.complete && shopIconsImg.naturalWidth > 0) {
                        ctx.drawImage(shopIconsImg, pu.defIdx * SHOP_ICON_SIZE, 0, SHOP_ICON_SIZE, SHOP_ICON_SIZE,
                            px, py, pIconSize, pIconSize);
                    } else {
                        ctx.fillStyle = '#FFA500';
                        ctx.fillRect(px, py, pIconSize, pIconSize);
                    }
                    if (pu.count > 1) {
                        const bx = px + pIconSize - 1;
                        const by = py + pIconSize - 1;
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                        ctx.beginPath();
                        ctx.arc(bx, by, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFD700';
                        ctx.font = 'bold 7px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(pu.count, bx, by + 2);
                    }
                    px += pIconSize + pGap;
                }
            }

            // Active upgrade slots (centered in HUD strip, bottom row)
            if (activeUpgrades.length > 0) {
                const slotW = 40;
                const slotH = 28;
                const slotGap = 5;
                const totalSlotsW = activeUpgrades.length * (slotW + slotGap) - slotGap;
                let sx = CANVAS_WIDTH / 2 - totalSlotsW / 2;
                const sy = hudY0 + 22;

                for (let i = 0; i < activeUpgrades.length; i++) {
                    const au = activeUpgrades[i];
                    const hasCharges = au.charges > 0;
                    const isActive = (au.id === 'cloak' && upgradeEffects.cloakTimer > 0) ||
                                     (au.id === 'emp' && upgradeEffects.empTimer > 0) ||
                                     (au.id === 'armor' && upgradeEffects.armorActive);

                    ctx.save();
                    if (isActive) {
                        ctx.fillStyle = au.color;
                        ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 150) * 0.1;
                        ctx.beginPath();
                        ctx.roundRect(sx, sy, slotW, slotH, 4);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        ctx.strokeStyle = au.color;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.roundRect(sx, sy, slotW, slotH, 4);
                        ctx.stroke();
                    } else if (hasCharges) {
                        ctx.fillStyle = 'rgba(30, 50, 80, 0.7)';
                        ctx.beginPath();
                        ctx.roundRect(sx, sy, slotW, slotH, 4);
                        ctx.fill();
                        ctx.strokeStyle = au.color;
                        ctx.globalAlpha = 0.6;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(sx, sy, slotW, slotH, 4);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    } else {
                        ctx.fillStyle = 'rgba(20, 20, 30, 0.6)';
                        ctx.beginPath();
                        ctx.roundRect(sx, sy, slotW, slotH, 4);
                        ctx.fill();
                        ctx.globalAlpha = 0.3;
                    }

                    // Icon
                    const iconSize = 18;
                    const ix = sx + (slotW - iconSize) / 2;
                    const iy = sy + 1;
                    if (shopIconsImg.complete && shopIconsImg.naturalWidth > 0) {
                        ctx.drawImage(shopIconsImg, au.defIdx * SHOP_ICON_SIZE, 0, SHOP_ICON_SIZE, SHOP_ICON_SIZE,
                            ix, iy, iconSize, iconSize);
                    } else {
                        ctx.fillStyle = au.color;
                        ctx.fillRect(ix, iy, iconSize, iconSize);
                    }

                    // Key label
                    ctx.font = 'bold 8px Impact, Arial Black, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = hasCharges ? au.color : 'rgba(255,255,255,0.3)';
                    ctx.fillText(au.key, sx + slotW / 2, sy + slotH - 2);

                    // Charge count badge
                    if (au.charges > 0) {
                        const cbx = sx + slotW - 3;
                        const cby = sy + 3;
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                        ctx.beginPath();
                        ctx.arc(cbx, cby, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#FFD700';
                        ctx.font = 'bold 8px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(au.charges, cbx, cby + 3);
                    }

                    ctx.restore();

                    renderHUD._activeSlots.push({ x: sx, y: sy, w: slotW, h: slotH, id: au.id });
                    sx += slotW + slotGap;
                }
            }

            // Stealth combo indicator (right side of HUD strip)
            if (gameState.sneakCombo > 0 && gameState.sneakComboTimer > 0) {
                ctx.textAlign = 'right';
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 11px Impact, Arial Black, sans-serif';
                const comboText = 'STEALTH x' + gameState.sneakCombo;
                ctx.fillText(comboText, CANVAS_WIDTH - 5, hudY0 + 14);
            }

            // Ammo indicator (level 6) — in HUD strip, top-center area
            if (gameState.level >= 6 && player.armed) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 11px Impact, Arial Black, sans-serif';
                if (player.ammo > 0) {
                    ctx.fillStyle = '#6AF';
                    ctx.strokeStyle = '#0a0e17';
                    ctx.lineWidth = 2;
                    const ammoText = 'AMMO: ' + player.ammo;
                    ctx.strokeText(ammoText, CANVAS_WIDTH / 2, hudY0 + 14);
                    ctx.fillText(ammoText, CANVAS_WIDTH / 2, hudY0 + 14);
                } else {
                    const blink = Math.floor(Date.now() / 300) % 2 === 0;
                    if (blink) {
                        ctx.fillStyle = '#F66';
                        ctx.strokeStyle = '#0a0e17';
                        ctx.lineWidth = 2;
                        ctx.strokeText('NO AMMO', CANVAS_WIDTH / 2, hudY0 + 14);
                        ctx.fillText('NO AMMO', CANVAS_WIDTH / 2, hudY0 + 14);
                    }
                }
            }

            // Cloak timer bar (in HUD strip, above active slots)
            if (upgradeEffects.cloakTimer > 0) {
                const barW = 80;
                const barH = 3;
                const barX = CANVAS_WIDTH / 2 - barW / 2;
                const barY = hudY0 + 18;
                const pct = upgradeEffects.cloakTimer / 5.0;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.fillStyle = '#A8F';
                ctx.fillRect(barX, barY, barW * pct, barH);
            }

            // EMP timer bar
            if (upgradeEffects.empTimer > 0) {
                const barW = 80;
                const barH = 3;
                const barX = CANVAS_WIDTH / 2 - barW / 2;
                const barY = hudY0 + 18 + (upgradeEffects.cloakTimer > 0 ? 5 : 0);
                const pct = upgradeEffects.empTimer / 4.0;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.fillStyle = '#4DF';
                ctx.fillRect(barX, barY, barW * pct, barH);
            }

            // Ghost Radar: colored pips at VIEWPORT edges pointing toward each ghost
            if (getUpgradeCount('radar') > 0) {
                const margin = 14;
                const pipSize = 5;
                const pd = dirToDelta(player.direction !== 'NONE' ? player.direction : player.lastFacing);
                const pp = player.stopped ? 0 : player.pixelProgress;
                const rpx = (player.tileX + pd.dx * pp) * TILE_SIZE + TILE_SIZE / 2;
                const rpy = (player.tileY + pd.dy * pp) * TILE_SIZE + TILE_SIZE / 2 - camera.y;
                ghosts.forEach(ghost => {
                    if (ghost.state === 'CAGE' || ghost.state === 'EATEN') return;
                    const gd2 = dirToDelta(ghost.direction);
                    const gp2 = ghost.pixelProgress || 0;
                    const gx = (ghost.tileX + gd2.dx * gp2) * TILE_SIZE + TILE_SIZE / 2;
                    const gy = (ghost.tileY + gd2.dy * gp2) * TILE_SIZE + TILE_SIZE / 2 - camera.y;
                    const angle = Math.atan2(gy - rpy, gx - rpx);
                    let edgeX, edgeY;
                    const cos = Math.cos(angle), sin = Math.sin(angle);
                    const tRight = cos > 0 ? (CANVAS_WIDTH - margin - rpx) / cos : Infinity;
                    const tLeft = cos < 0 ? (margin - rpx) / cos : Infinity;
                    const tBottom = sin > 0 ? (VIEWPORT_HEIGHT - margin - rpy) / sin : Infinity;
                    const tTop = sin < 0 ? (margin - rpy) / sin : Infinity;
                    const t = Math.min(tRight, tLeft, tBottom, tTop);
                    if (!isFinite(t) || t <= 0) return;
                    edgeX = rpx + cos * t;
                    edgeY = rpy + sin * t;
                    edgeX = Math.max(margin, Math.min(CANVAS_WIDTH - margin, edgeX));
                    edgeY = Math.max(margin, Math.min(VIEWPORT_HEIGHT - margin, edgeY));
                    ctx.save();
                    const color = ghost.frightened ? '#44F' : (ghost.color || '#F00');
                    ctx.fillStyle = color;
                    ctx.globalAlpha = 0.9;
                    ctx.translate(edgeX, edgeY);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(pipSize, 0);
                    ctx.lineTo(-pipSize, -pipSize * 0.7);
                    ctx.lineTo(-pipSize * 0.3, 0);
                    ctx.lineTo(-pipSize, pipSize * 0.7);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                });
            }
        }

        // ============= SOUND SYSTEM =============
        function playWaka() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 400 + Math.random() * 200;
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        }

        function playCloakSound() {
            if (!gameState.soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            // Shimmer: rising sine with tremolo
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            osc.type = 'sine';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            lfo.connect(lfoGain);
            lfoGain.connect(gain.gain);
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(800, now + 0.4);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
            lfo.frequency.value = 12;
            lfoGain.gain.value = 0.06;
            lfo.start(now);
            osc.start(now);
            osc.stop(now + 0.5);
            lfo.stop(now + 0.5);

        };

        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                // Upgrades overlay input handling (only during gameplay)
                if (gameState.showUpgradesOverlay && !gameState.isTitle) {
                    if (e.key === 'Escape' || e.key === 'u' || e.key === 'U') {
                        gameState.showUpgradesOverlay = false;
                    }
                    e.preventDefault();
                    return;
                }
                // Upgrade shop input handling
                if (gameState.showShop) {
                    if (e.key === 's' || e.key === 'S' || e.key === 'Escape') {
                        closeShop();
                    }
                    if (e.key === '1') shopBuySlot(0);
                    if (e.key === '2') shopBuySlot(1);
                    if (e.key === '3') shopBuySlot(2);
                    e.preventDefault();
                    return;
                }
                if (gameState.showLevelSelect) {
                    gameState.showLevelSelect = false;
                    e.preventDefault();
                    return;
                }
                if (gameState.showHowToPlay) {
                    var htpPage = gameState.htpPage || 0;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' || e.key === ' ' || e.key === 'Enter') {
                        if (htpPage < HTP_TOTAL_PAGES - 1) {
                            gameState.htpPage = htpPage + 1;
                        } else {
                            gameState.showHowToPlay = false;
                            gameState.htpPage = 0;
                        }
                    } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                        if (htpPage > 0) gameState.htpPage = htpPage - 1;
                    } else if (e.key === 'Escape') {
                        gameState.showHowToPlay = false;
                        gameState.htpPage = 0;
                    }
                    e.preventDefault();
                    return;
                }
                if (e.key === 'Enter') startFromTitle();
                if (e.key === ' ') {
                    if (!gameState.isTitle && player.armed && player.ammo > 0) {
                        fireRifle();
                    } else {
                        startFromTitle();
                    }
                }
                if (e.key === 'Escape') returnToTitle();
                if ((e.key === 'b' || e.key === 'B') && gameState.levelAnnounce > 0) {
                    gameState.levelAnnounce = 0;
                    gameState.shopPendingRespawn = null; // no respawn needed, already positioned
                    openShop();
                    e.preventDefault();
                    return;
                }
                // Active upgrade activation keys (Q, E, R during gameplay)
                if (!gameState.isTitle && !gameState.gameOver && !gameState.showShop && gameState.levelAnnounce <= 0) {
                    if (e.key === 'q' || e.key === 'Q') {
                        activatePhaseShift();
                        e.preventDefault();
                        return;
                    }
                    if (e.key === 'e' || e.key === 'E') {
                        activateCloak();
                        e.preventDefault();
                        return;
                    }
                    if (e.key === 'r' || e.key === 'R') {
                        activateEMP();
                        e.preventDefault();
                        return;
                    }
                }
                if (e.key === 'm' || e.key === 'M') {
                    gameState.soundEnabled = !gameState.soundEnabled;
                    localStorage.setItem('pacmanSound', gameState.soundEnabled ? 'true' : 'false');
                }
                if (e.key === 'd' || e.key === 'D') {
                    diagEnabled = !diagEnabled;
                }
                if (KEY_MAP[e.key]) {
                    heldDirection = KEY_MAP[e.key];
                    player.nextDirection = heldDirection;
                    e.preventDefault();
                }
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                    e.preventDefault();
                }
            });
            document.addEventListener('keyup', (e) => {
                const dir = KEY_MAP[e.key];
                if (dir && dir === heldDirection) {
                    heldDirection = 'NONE';
                    // If player hasn't started moving yet (still at tile center),
                    // start a one-tile coast so a quick tap = one tile of movement
                    if (player.stopped && player.direction === 'NONE' && player.nextDirection === dir) {
                        if (canMoveTo(player.tileX, player.tileY, dir)) {
                            player.direction = dir;
                            player.lastFacing = dir;
                            player.stopped = false;
                            player.coasting = true;
                            player.pixelProgress = 0;
                        }
                        player.nextDirection = 'NONE';
                    } else {
                        // Clear buffered direction so coasting kicks in
                        if (player.nextDirection === dir) {
                            player.nextDirection = 'NONE';
                        }
                    }
                }
            });
        }

        function setupDPad() {
            const dpadButtons = {
                'dpad-up': 'UP',
                'dpad-down': 'DOWN',
                'dpad-left': 'LEFT',
                'dpad-right': 'RIGHT'
            };

            // Prevent double-fire on mobile (touchstart + synthetic click)
            let lastTouchTime = 0;
            function touchGuard(fn) {
                return function(e) {
                    if (e.type === 'touchstart') {
                        lastTouchTime = Date.now();
                        e.preventDefault();
                        fn();
                    } else if (e.type === 'click') {
                        // Ignore click if a touch just happened (within 500ms)
                        if (Date.now() - lastTouchTime < 500) return;
                        fn();
                    }
                };
            }

            // Canvas tap: check for HTP button first, then start game
            function canvasInteract(e) {
                let clientX, clientY;
                if (e.type === 'touchstart') {
                    lastTouchTime = Date.now();
                    e.preventDefault();
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.type === 'click') {
                    if (Date.now() - lastTouchTime < 500) return;
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                // Convert to canvas coordinates
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const cx = (clientX - rect.left) * scaleX;
                const cy = (clientY - rect.top) * scaleY;
                // World-coordinate version for game-world click detection
                const worldCy = cy + camera.y;
                // Shop button on level announce screen
                if (gameState.levelAnnounce > 0 && render._shopBtn) {
                    const sb = render._shopBtn;
                    if (cx >= sb.x && cx <= sb.x + sb.w && cy >= sb.y && cy <= sb.y + sb.h) {
                        gameState.levelAnnounce = 0;
                        gameState.shopPendingRespawn = null;
                        openShop();
                        return;
                    }
                }
                // Upgrades overlay click handling (only during gameplay)
                if (gameState.showUpgradesOverlay && !gameState.isTitle) {
                    handleUpgradesOverlayClick(cx, cy);
                    return;
                }
                // Upgrade shop click handling
                if (gameState.showShop) {
                    handleShopClick(cx, cy);
                    return;
                }
                // Active upgrade HUD slot tap detection (during gameplay)
                if (!gameState.isTitle && !gameState.gameOver && !gameState.showShop && gameState.levelAnnounce <= 0 && !gameState.showUpgradesOverlay) {
                    var slots = renderHUD._activeSlots || [];
                    for (var si = 0; si < slots.length; si++) {
                        var slot = slots[si];
                        if (cx >= slot.x && cx <= slot.x + slot.w && cy >= slot.y && cy <= slot.y + slot.h) {
                            if (slot.id === 'phase') activatePhaseShift();
                            else if (slot.id === 'cloak') activateCloak();
                            else if (slot.id === 'emp') activateEMP();
                            return;
                        }
                    }
                }
                // Dismiss level select if showing
                if (gameState.showLevelSelect) {
                    // Check if a level button was clicked
                    if (drawLevelSelect._buttons) {
                        for (let i = 0; i < drawLevelSelect._buttons.length; i++) {
                            let btn = drawLevelSelect._buttons[i];
                            if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
                                startAtLevel(btn.level);
                                return;
                            }
                        }
                    }
                    // If clicked outside buttons, close level select
                    gameState.showLevelSelect = false;
                    return;
                }
                // HTP page navigation via tap/click
                if (gameState.showHowToPlay) {
                    var htpPage = gameState.htpPage || 0;
                    // Check PREV button
                    var prevBtn = drawHowToPlay._prevBtn;
                    if (prevBtn && cx >= prevBtn.x && cx <= prevBtn.x + prevBtn.w && cy >= prevBtn.y && cy <= prevBtn.y + prevBtn.h) {
                        if (htpPage > 0) gameState.htpPage = htpPage - 1;
                        return;
                    }
                    // Check NEXT/CLOSE button
                    var nextBtn = drawHowToPlay._nextBtn;
                    if (nextBtn && cx >= nextBtn.x && cx <= nextBtn.x + nextBtn.w && cy >= nextBtn.y && cy <= nextBtn.y + nextBtn.h) {
                        if (htpPage < HTP_TOTAL_PAGES - 1) {
                            gameState.htpPage = htpPage + 1;
                        } else {
                            gameState.showHowToPlay = false;
                            gameState.htpPage = 0;
                        }
                        return;
                    }
                    // Tap anywhere else: advance page (or close on last)
                    if (htpPage < HTP_TOTAL_PAGES - 1) {
                        gameState.htpPage = htpPage + 1;
                    } else {
                        gameState.showHowToPlay = false;
                        gameState.htpPage = 0;
                    }
                    return;
                }
                // Check title screen buttons
                if (!handleTitleClick(cx, cy)) {
                    startFromTitle();
                }
            }
            canvas.addEventListener('click', canvasInteract);
            canvas.addEventListener('touchstart', canvasInteract, { passive: false });

            // Menu button
            var menuEl = document.getElementById('menuBtn');
            function doMenu(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                returnToTitle();
            }
            menuEl.addEventListener('click', doMenu);
            menuEl.addEventListener('touchstart', doMenu, { passive: false });

            // How to Play button
            var htpEl = document.getElementById('htpBtn');
            function doHtp(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                gameState.showHowToPlay = !gameState.showHowToPlay;
                if (gameState.showHowToPlay) gameState.htpPage = 0;
                // If we're on the title screen, make sure the title loop is running
                if (gameState.isTitle) showTitle();
            }
            htpEl.addEventListener('click', doHtp);
            htpEl.addEventListener('touchstart', doHtp, { passive: false });

            // Level Select button
            var lvlEl = document.getElementById('lvlBtn');
            function doLvl(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                gameState.showLevelSelect = !gameState.showLevelSelect;
                // If we're on the title screen, make sure the title loop is running
                if (gameState.isTitle) showTitle();
            }
            lvlEl.addEventListener('click', doLvl);
            lvlEl.addEventListener('touchstart', doLvl, { passive: false });

            // Sound toggle button
            var soundBtn = document.getElementById('soundBtn');
            function doToggleSound(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                gameState.soundEnabled = !gameState.soundEnabled;
                soundBtn.textContent = gameState.soundEnabled ? '🔊 ON' : '🔇 OFF';
            }
            soundBtn.addEventListener('click', doToggleSound);
            soundBtn.addEventListener('touchstart', doToggleSound, { passive: false });

            var upgradesEl = document.getElementById('upgradesBtn');
            function doShowUpgrades(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                // Only toggle during gameplay, not on title screen
                if (gameState.isTitle || gameState.gameOver) return;
                gameState.showUpgradesOverlay = !gameState.showUpgradesOverlay;
            }
            upgradesEl.addEventListener('click', doShowUpgrades);
            upgradesEl.addEventListener('touchstart', doShowUpgrades, { passive: false });

            // Reset button — clears money and all upgrades
            var resetEl = document.getElementById('resetBtn');
            var resetConfirmPending = false;
            var resetConfirmTimer = null;
            function doReset(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                if (!resetConfirmPending) {
                    // First tap: show confirmation
                    resetConfirmPending = true;
                    resetEl.textContent = 'CONFIRM?';
                    resetEl.style.background = 'rgba(255, 0, 0, 0.5)';
                    resetEl.style.color = '#FFF';
                    resetConfirmTimer = setTimeout(function() {
                        resetConfirmPending = false;
                        resetEl.textContent = 'RESET';
                        resetEl.style.background = '';
                        resetEl.style.color = '';
                    }, 3000);
                } else {
                    // Second tap: actually reset
                    clearTimeout(resetConfirmTimer);
                    resetConfirmPending = false;
                    gameState.money = 0;
                    ownedUpgrades = {};
                    activeCharges = {};
                    saveMoney();
                    saveUpgrades();
                    resetUpgradeEffects();
                    resetEl.textContent = 'RESET';
                    resetEl.style.background = '';
                    resetEl.style.color = '';
                    // Flash green briefly to confirm
                    resetEl.style.background = 'rgba(0, 255, 0, 0.4)';
                    resetEl.textContent = 'DONE!';
                    setTimeout(function() {
                        resetEl.textContent = 'RESET';
                        resetEl.style.background = '';
                    }, 1000);
                }
            }
            resetEl.addEventListener('click', doReset);
            resetEl.addEventListener('touchstart', doReset, { passive: false });

            // D-pad buttons — held while pressed, release stops movement
            Object.entries(dpadButtons).forEach(([id, dir]) => {
                const btn = document.getElementById(id);

                function pressDir(e) {
                    if (e) e.preventDefault();
                    heldDirection = dir;
                    player.nextDirection = dir;
                    btn.classList.add('active');
                    // Also start game from title on any d-pad press
                    startFromTitle();
                }
                function releaseDir(e) {
                    if (e) e.preventDefault();
                    if (heldDirection === dir) {
                        heldDirection = 'NONE';
                        // If player hasn't started moving yet, start a one-tile coast
                        if (player.stopped && player.direction === 'NONE' && player.nextDirection === dir) {
                            if (canMoveTo(player.tileX, player.tileY, dir)) {
                                player.direction = dir;
                                player.lastFacing = dir;
                                player.stopped = false;
                                player.coasting = true;
                                player.pixelProgress = 0;
                            }
                            player.nextDirection = 'NONE';
                        } else {
                            if (player.nextDirection === dir) {
                                player.nextDirection = 'NONE';
                            }
                        }
                    }
                    btn.classList.remove('active');
                }

                btn.addEventListener('touchstart', pressDir, { passive: false });
                btn.addEventListener('touchend', releaseDir, { passive: false });
                btn.addEventListener('touchcancel', releaseDir, { passive: false });
                btn.addEventListener('mousedown', pressDir);
                btn.addEventListener('mouseup', releaseDir);
                btn.addEventListener('mouseleave', releaseDir);
            });

            // Global touchend/touchcancel fallback: if finger slides off a D-pad
            // button, Safari may not fire touchend on the original element.
            // Only clear if no touches remain on any D-pad button.
            function globalTouchCleanup(e) {
                // Check if any remaining touch is on a dpad button
                const remaining = e.touches || [];
                let onDpad = false;
                for (let i = 0; i < remaining.length; i++) {
                    const el = document.elementFromPoint(remaining[i].clientX, remaining[i].clientY);
                    if (el && el.classList && el.classList.contains('dpad-button')) {
                        onDpad = true;
                        break;
                    }
                }
                if (!onDpad) {
                    document.querySelectorAll('.dpad-button.active').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    heldDirection = 'NONE';
                    player.nextDirection = 'NONE';
                }
            }
            document.addEventListener('touchend', globalTouchCleanup, { passive: true });
            document.addEventListener('touchcancel', globalTouchCleanup, { passive: true });

            // Fire button
            var fireBtnEl = document.getElementById('fireBtn');
            function doFire(e) {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (e && e.type === 'touchstart') lastTouchTime = Date.now();
                else if (e && e.type === 'click' && Date.now() - lastTouchTime < 500) return;
                if (!gameState.isTitle && player.armed && player.ammo > 0) {
                    fireRifle();
                }
            }
            fireBtnEl.addEventListener('click', doFire);
            fireBtnEl.addEventListener('touchstart', doFire, { passive: false });
        }

        // Start the game
        window.addEventListener('load', init);
    </script>
</body>
</html>
